<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Not Found — BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>
/* ===== 404 PAGE ===== */

.notfound {
    min-height: 100vh;
    background: var(--dark);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 8%;
    text-align: center;
}

.notfound-inner {
    max-width: 700px;
}

.notfound-code {
    font-size: 120px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1;
    margin-bottom: 10px;
}

.notfound h1 {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 16px;
}

.notfound p {
    font-size: 18px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 35px;
}

/* Buttons */
.notfound-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-404 {
    padding: 14px 26px;
    border-radius: 10px;
    font-weight: 700;
    text-decoration: none;
    transition: 0.2s ease;
    font-size: 15px;
}

.btn-primary {
    background: var(--orange);
    color: #000;
}

.btn-primary:hover {
    background: #ff8c1a;
}

.btn-secondary {
    background: transparent;
    border: 2px solid #444;
    color: var(--white);
}

.btn-secondary:hover {
    border-color: var(--orange);
    color: var(--orange);
}

/* Helpful links */
.notfound-links {
    margin-top: 50px;
}

.notfound-links p {
    font-size: 14px;
    color: #777;
    margin-bottom: 12px;
}

.notfound-links a {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
    margin: 0 10px;
}

.notfound-links a:hover {
    text-decoration: underline;
}

/* Mobile */
@media (max-width: 600px) {
    .notfound-code {
        font-size: 80px;
    }

    .notfound h1 {
        font-size: 28px;
    }

    .notfound p {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div id="navbar"></div>

<section class="notfound">
    <div class="notfound-inner">

        <div class="notfound-code">404</div>

        <h1>This Page Got Cut… Like Your Grass Should Be</h1>

        <p>
            The page you're looking for doesn’t exist or got moved.
            But don’t worry — we’re still here and ready to make your lawn look right.
        </p>

        <div class="notfound-actions">
            <a href="/" class="btn-404 btn-primary">Go Home</a>
            <a href="/pricing" class="btn-404 btn-secondary">Get a Price</a>
        </div>

        <div class="notfound-links">
            <p>Or go straight to what you need:</p>
            <a href="/services/spring-summer/">Services</a>
            <a href="/pricing">Instant Quote</a>
            <a href="/contact">Contact</a>
        </div>

    </div>
</section>

<div id="footer"></div>
<script src="/js/include.js"></script>

</body>
</html>

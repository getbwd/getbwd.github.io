<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){ auth.signOut().then(function(){ window.location.href='/account/login/'; }); });
document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); });
document.getElementById('sidebarOverlay').addEventListener('click', function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s = (status||'').toLowerCase().trim();
    var map = {
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){ return '<p class="empty-state">'+msg+'</p>'; }

function invoiceBalance(inv){
    var total   = inv.items.reduce(function(s,i){ return s + Number(i.qty||1) * Number(i.unitPrice||0); }, 0);
    var paidAmt = inv.payments.reduce(function(s,p){ return s + Number(p.amount||0); }, 0);
    return Math.max(0, Math.round((total - paidAmt) * 100) / 100);
}

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href = '/account/login/'; return; }
    var name = user.displayName || 'there';
    document.getElementById('userName').textContent = name.split(' ')[0];
    document.getElementById('mobileAvatar').textContent = initials(name);

    // Fetch all three collections in parallel
    var results = await Promise.all([
        db.collection('jobs').where('uid','==',user.uid).orderBy('date','desc').get(),
        db.collection('invoices').where('uid','==',user.uid).orderBy('dateIssued','desc').get(),
        db.collection('services').doc(user.uid).get(),
    ]);

    // ── Normalize jobs ──
    var jobs = [];
    results[0].forEach(function(doc){
        var d = doc.data();
        jobs.push({
            jobId:    doc.id,
            status:   d.status   || 'Scheduled',
            date:     d.date     ? d.date.toDate()     : null,
            time:     d.time     || '',
            services: Array.isArray(d.services) ? d.services : [],
            rating:   d.rating   || 0,
            feedback: d.feedback || '',
        });
    });

    // ── Normalize invoices ──
    var invoices = [];
    results[1].forEach(function(doc){
        var d = doc.data();
        if((d.status||'').toLowerCase() === 'draft') return;
        invoices.push({
            invId:      doc.id,
            status:     d.status     || 'Payment Due',
            dateIssued: d.dateIssued ? d.dateIssued.toDate() : null,
            items:      Array.isArray(d.items)    ? d.items    : [],
            payments:   Array.isArray(d.payments) ? d.payments : [],
        });
    });

    // ── Normalize services ──
    var svcList = [];
    if(results[2].exists && Array.isArray(results[2].data().services)){
        svcList = results[2].data().services;
    }

    // ── Review prompt — completed jobs within last 5 days with no local review ──
    var fiveDaysAgo = new Date(); fiveDaysAgo.setDate(fiveDaysAgo.getDate()-5); fiveDaysAgo.setHours(0,0,0,0);
    var now = new Date(); now.setHours(0,0,0,0);
    var reviewPromptJob = null;
    var completedRecent = jobs.filter(function(j){
        if(j.status.toLowerCase() !== 'completed') return false;
        return j.date && j.date >= fiveDaysAgo && j.date <= new Date();
    });
    for(var ri=0; ri<completedRecent.length; ri++){
        var jr = completedRecent[ri];
        var saved = null; try{ saved = JSON.parse(localStorage.getItem('bwd_review_'+jr.jobId)); }catch(e){}
        if(!saved || (!saved.rating && !saved.feedback)){ reviewPromptJob = jr; break; }
    }
    var promptEl = document.getElementById('reviewPrompt');
    if(reviewPromptJob && promptEl){
        var rpNames = reviewPromptJob.services.map(function(s){ return s.name; }).join(', ') || 'your recent visit';
        var rpDate  = reviewPromptJob.date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        promptEl.style.display = 'block';
        promptEl.innerHTML = '<a href="/account/dashboard/appointments/#'+reviewPromptJob.jobId+'" style="text-decoration:none;">'+
            '<div style="background:var(--orange-dim);border:1px solid rgba(224,90,18,0.25);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;">'+
            '<div><p style="font-size:13px;font-weight:700;color:var(--orange-dark);margin-bottom:2px;">⭐ How was your visit on '+rpDate+'?</p>'+
            '<p style="font-size:12px;color:var(--orange-dark);opacity:0.8;">'+rpNames+' — tap to leave a rating and feedback.</p></div>'+
            '<span style="font-size:20px;">→</span></div></a>';
    }

    // ── Next appointment stat ──
    var upcoming = jobs.filter(function(j){
        var s = j.status.toLowerCase();
        return j.date && j.date >= now && s !== 'cancelled' && s !== 'completed';
    }).sort(function(a,b){ return a.date - b.date; });
    var nextJob = upcoming[0] || null;
    document.getElementById('statNextAppt').textContent = nextJob
        ? nextJob.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})
        : 'None scheduled';

    // ── Active services stat ──
    var activeCount = svcList.filter(function(s){
        return ['active','seasonal'].indexOf((s.status||'').toLowerCase()) !== -1;
    }).length;
    document.getElementById('statServices').textContent = activeCount;

    // ── Open invoices & amount due ──
    var openInv = invoices.filter(function(inv){ return invoiceBalance(inv) >= 0.01; });
    document.getElementById('statOpenInvoices').textContent = openInv.length;
    var totalDue = openInv.reduce(function(s,inv){ return s + invoiceBalance(inv); }, 0);
    document.getElementById('statAmountDue').textContent = fmtMoney(totalDue);

    // ── Upcoming appointment card ──
    var apptEl = document.getElementById('overviewApptBody');
    if(nextJob){
        var svcNames = nextJob.services.map(function(s){ return s.name; }).join(', ') || 'Service Visit';
        var dateStr  = nextJob.date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        var timeStr  = nextJob.time ? ' · ' + nextJob.time : '';
        apptEl.innerHTML = '<a href="/account/dashboard/appointments/#'+nextJob.jobId+'" style="text-decoration:none;display:block;">'+
            '<div class="ov-row" style="cursor:pointer;">'+
            '<div><p class="ov-title" style="color:var(--orange);">'+svcNames+'</p>'+
            '<p class="ov-sub">'+dateStr+timeStr+'</p></div>'+
            badge(nextJob.status)+
            '</div></a>';
    } else {
        apptEl.innerHTML = empty('No upcoming appointments.');
    }

    // ── Latest invoice card ──
    var invEl   = document.getElementById('overviewInvoiceBody');
    var latest  = invoices[0] || null; // already sorted by dateIssued desc
    if(latest){
        var invTotal   = latest.items.reduce(function(s,i){ return s + Number(i.qty||1)*Number(i.unitPrice||0); }, 0);
        var invBalance = invoiceBalance(latest);
        var invDesc    = latest.items.map(function(i){ return i.name; }).join(', ') || 'Invoice';
        var invDate    = latest.dateIssued ? latest.dateIssued.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
        invEl.innerHTML = '<a href="/account/dashboard/invoices/#'+latest.invId+'" style="text-decoration:none;display:block;">'+
            '<div class="ov-row" style="cursor:pointer;">'+
            '<div><p class="ov-title" style="color:var(--orange);">'+invDesc+'</p>'+
            '<p class="ov-sub">'+invDate+' · #'+latest.invId+'</p></div>'+
            '<div style="text-align:right"><p class="ov-title mono">'+fmtMoney(invBalance>0?invBalance:invTotal)+'</p>'+badge(latest.status)+'</div>'+
            '</div></a>';
    } else {
        invEl.innerHTML = empty('No invoices yet.');
    }

    // ── Service chips ──
    var chipsEl = document.getElementById('overviewServiceChips');
    var activeChips = svcList
        .filter(function(s){ return ['active','seasonal'].indexOf((s.status||'').toLowerCase()) !== -1; })
        .map(function(s){ return '<a href="/account/dashboard/services/" style="text-decoration:none;"><span class="svc-chip active">'+s.name+'</span></a>'; });
    chipsEl.innerHTML = activeChips.length ? activeChips.join('') : empty('No active services.');
});
</script>

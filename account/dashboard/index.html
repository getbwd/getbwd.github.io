<link rel="stylesheet" href="../../css/dashboard.css">

<body>
<div class="dash-shell">

      <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
      <a class="nav-item" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
      <a class="nav-item" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
      <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>
  <header class="mobile-header">
    <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="mobile-brand">BWD Services</span>
    <div class="mobile-avatar" id="mobileAvatar">?</div>
  </header>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="dash-main">
    <div class="dash-page">
      <div class="section-header">
        <h1 class="section-title">Welcome, <span id="userName">there</span>.</h1>
        <p class="section-sub">Here's a look at your account.</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><span class="stat-label">Next Appointment</span><span class="stat-value" id="statNextAppt">—</span></div>
        <div class="stat-card"><span class="stat-label">Active Services</span><span class="stat-value" id="statServices">—</span></div>
        <div class="stat-card"><span class="stat-label">Open Invoices</span><span class="stat-value" id="statOpenInvoices">—</span></div>
        <div class="stat-card accent"><span class="stat-label">Amount Due</span><span class="stat-value" id="statAmountDue">—</span></div>
      </div>
      <div id="reviewPrompt" style="display:none;"></div>
      <div class="overview-grid">
        <div class="card">
          <div class="card-header"><span class="card-title">Upcoming Appointment</span><a class="card-link" href="/account/dashboard/appointments/">View all</a></div>
          <div class="card-body" id="overviewApptBody"><span class="loading-text">Loading…</span></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">Latest Invoice</span><a class="card-link" href="/account/dashboard/invoices/">View all</a></div>
          <div class="card-body" id="overviewInvoiceBody"><span class="loading-text">Loading…</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Active Services</span><a class="card-link" href="/account/dashboard/services/">View all</a></div>
        <div class="service-chips" id="overviewServiceChips"><span class="loading-text">Loading…</span></div>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
  projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
  messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

// ── Utilities ──────────────────────────────────────────────────────────────
function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}

function badge(status){
  var s=(status||'').toLowerCase().trim();
  var map={
    'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled',
    'cancelled':'bdg-cancelled','completed':'bdg-completed','draft':'bdg-default',
    'payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
    'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled'
  };
  return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}

// Invoice balance: sum lineItems - sum payments
function invoiceBalance(inv){
  var total=(inv.lineItems||[]).reduce(function(s,i){return s+(i.qty||1)*(i.unitPrice||0);},0);
  var paid=(inv.payments||[]).reduce(function(s,p){return s+(p.amount||0);},0);
  return Math.max(0,Math.round((total-paid)*100)/100);
}

// ── UI wiring ──────────────────────────────────────────────────────────────
document.getElementById('signOutBtn').addEventListener('click',function(){
  auth.signOut().then(function(){window.location.href='/account/login/';});
});
document.getElementById('mobileMenuBtn').addEventListener('click',function(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('visible');
});
document.getElementById('sidebarOverlay').addEventListener('click',function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
});

// ── Auth & data ────────────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='/account/login/';return;}

  var name=user.displayName||'there';
  document.getElementById('userName').textContent=name.split(' ')[0];
  document.getElementById('mobileAvatar').textContent=initials(name);

  var uid=user.uid;
  var now=new Date(); now.setHours(0,0,0,0);
  var fiveDaysAgo=new Date(); fiveDaysAgo.setDate(fiveDaysAgo.getDate()-5); fiveDaysAgo.setHours(0,0,0,0);

  // Three parallel real-time listeners — each updates its own section independently
  // so whatever loads first renders immediately, no waiting for the others.

  // ── JOBS listener ──
  db.collection('jobs')
    .where('uid','==',uid)
    .onSnapshot(function(snap){
      var jobs=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});

      // Next appointment stat
      var upcoming=jobs.filter(function(j){
        var s=(j.status||'').toLowerCase();
        var d=j.date&&j.date.toDate?j.date.toDate():new Date(j.date||0);
        return d>=now && s!=='cancelled' && s!=='canceled' && s!=='completed';
      }).sort(function(a,b){
        var da=a.date&&a.date.toDate?a.date.toDate():new Date(a.date||0);
        var db2=b.date&&b.date.toDate?b.date.toDate():new Date(b.date||0);
        return da-db2;
      });
      var nextJob=upcoming[0]||null;
      document.getElementById('statNextAppt').textContent=nextJob
        ?(nextJob.date&&nextJob.date.toDate?nextJob.date.toDate():new Date(nextJob.date))
            .toLocaleDateString('en-US',{month:'short',day:'numeric'})
        :'None scheduled';

      // Upcoming appointment card
      var apptEl=document.getElementById('overviewApptBody');
      if(nextJob){
        var names=(nextJob.lineItems||[]).map(function(i){return i.name;}).join(', ')||'Service Visit';
        var d=nextJob.date&&nextJob.date.toDate?nextJob.date.toDate():new Date(nextJob.date);
        var dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        var time=nextJob.time?' · '+nextJob.time:'';
        apptEl.innerHTML='<a href="/account/dashboard/appointments/#'+nextJob.id+'" style="text-decoration:none;display:block;"><div class="ov-row" style="cursor:pointer;"><div><p class="ov-title" style="color:var(--orange);">'+names+'</p><p class="ov-sub">'+dateStr+time+'</p></div>'+badge(nextJob.status||'Scheduled')+'</div></a>';
      } else {apptEl.innerHTML=empty('No upcoming appointments.');}

      // Review prompt — completed jobs within last 5 days with no local review
      var completedRecent=jobs.filter(function(j){
        if((j.status||'').toLowerCase()!=='completed') return false;
        var d=j.date&&j.date.toDate?j.date.toDate():new Date(j.date||0);
        return d>=fiveDaysAgo && d<=new Date();
      }).sort(function(a,b){
        var da=a.date&&a.date.toDate?a.date.toDate():new Date(a.date||0);
        var db2=b.date&&b.date.toDate?b.date.toDate():new Date(b.date||0);
        return db2-da;
      });

      var reviewPromptJob=null;
      for(var ri=0;ri<completedRecent.length;ri++){
        var jr=completedRecent[ri];
        // Rating lives directly on the job doc now (not localStorage)
        if(!jr.rating && !jr.feedback){reviewPromptJob=jr;break;}
      }
      var promptEl=document.getElementById('reviewPrompt');
      if(reviewPromptJob&&promptEl){
        var rpNames=(reviewPromptJob.lineItems||[]).map(function(i){return i.name;}).join(', ')||'your recent visit';
        var rpD=reviewPromptJob.date&&reviewPromptJob.date.toDate?reviewPromptJob.date.toDate():new Date(reviewPromptJob.date);
        var rpDate=rpD.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        promptEl.style.display='block';
        promptEl.innerHTML='<a href="/account/dashboard/appointments/#'+reviewPromptJob.id+'" style="text-decoration:none;"><div style="background:var(--orange-dim);border:1px solid rgba(224,90,18,0.25);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;"><div><p style="font-size:13px;font-weight:700;color:var(--orange-dark);margin-bottom:2px;">⭐ How was your visit on '+rpDate+'?</p><p style="font-size:12px;color:var(--orange-dark);opacity:0.8;">'+rpNames+' — tap to leave a rating and feedback.</p></div><span style="font-size:20px;">→</span></div></a>';
      } else if(promptEl){promptEl.style.display='none';}
    });

  // ── INVOICES listener ──
  db.collection('invoices')
    .where('uid','==',uid)
    .onSnapshot(function(snap){
      var invoices=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
        .filter(function(inv){return (inv.status||'').toLowerCase()!=='draft';});

      // Stats
      var openInv=invoices.filter(function(inv){return invoiceBalance(inv)>=0.01;});
      document.getElementById('statOpenInvoices').textContent=openInv.length;
      var totalDue=openInv.reduce(function(s,inv){return s+invoiceBalance(inv);},0);
      document.getElementById('statAmountDue').textContent=fmtMoney(totalDue);

      // Latest invoice card
      var invEl=document.getElementById('overviewInvoiceBody');
      var sorted=invoices.slice().sort(function(a,b){
        var da=a.date&&a.date.toDate?a.date.toDate():new Date(a.date||0);
        var db2=b.date&&b.date.toDate?b.date.toDate():new Date(b.date||0);
        return db2-da;
      });
      var latest=sorted[0]||null;
      if(latest){
        var total=(latest.lineItems||[]).reduce(function(s,i){return s+(i.qty||1)*(i.unitPrice||0);},0);
        var balance=invoiceBalance(latest);
        var desc=(latest.lineItems||[]).map(function(i){return i.name;}).join(', ')||'Invoice';
        var d=latest.date&&latest.date.toDate?latest.date.toDate():new Date(latest.date||0);
        var dStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        invEl.innerHTML='<a href="/account/dashboard/invoices/#'+latest.id+'" style="text-decoration:none;display:block;"><div class="ov-row" style="cursor:pointer;"><div><p class="ov-title" style="color:var(--orange);">'+desc+'</p><p class="ov-sub">'+dStr+' · #'+latest.id+'</p></div><div style="text-align:right"><p class="ov-title mono">'+fmtMoney(balance>0?balance:total)+'</p>'+badge(latest.status)+'</div></div></a>';
      } else {invEl.innerHTML=empty('No invoices yet.');}
    });

  // ── SERVICES listener ──
  db.collection('services')
    .where('uid','==',uid)
    .onSnapshot(function(snap){
      var services=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});

      // Active service count — unique service names across all active plans
      var allNames={};
      services.forEach(function(plan){
        if((plan.status||'').toLowerCase()==='active'){
          (plan.services||[]).forEach(function(s){allNames[s.name]=true;});
        }
      });
      document.getElementById('statServices').textContent=Object.keys(allNames).length;

      // Service chips
      var chipsEl=document.getElementById('overviewServiceChips');
      var chips=[];
      services.forEach(function(plan){
        var isActive=(plan.status||'').toLowerCase()==='active';
        (plan.services||[]).forEach(function(s){
          chips.push('<a href="/account/dashboard/services/" style="text-decoration:none;"><span class="svc-chip '+(isActive?'active':'')+'">'+s.name+'</span></a>');
        });
      });
      chipsEl.innerHTML=chips.length?chips.join(''):empty('No active services.');
    });
});
</script>

</body>
</html>

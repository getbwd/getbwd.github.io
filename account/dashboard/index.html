<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overview | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="dashboard.css">
<style>.loading-text{color:#ccc;font-size:14px;}</style>
</head>
<style>
/* =============================================================
   BWD Services — dashboard.css  (shared across all pages)
   ============================================================= */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
    --orange:       #e05a12;
    --orange-dark:  #c94b08;
    --orange-dim:   rgba(224,90,18,0.12);
    --dark:         #111110;
    --white:        #ffffff;
    --bg:           #f5f4f1;
    --border:       #e8e7e3;
    --border-light: #f0efe9;
    --muted:        #999;
    --text:         #111110;
    --text-2:       #444;
    --text-3:       #888;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}

/* ── SHELL ── */
.dash-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 240px;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 100;
    flex-shrink: 0;
}

.sidebar-top {
    padding: 22px 22px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sidebar-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 14px 10px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    font-family: 'Inter', sans-serif;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(224,90,18,0.15); color: var(--orange); }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }

.sidebar-footer {
    padding: 10px 10px 18px;
    border-top: 1px solid rgba(255,255,255,0.07);
}

.signout-btn { color: rgba(255,255,255,0.32); }
.signout-btn:hover { color: var(--orange); background: rgba(224,90,18,0.1); }

/* ── MOBILE HEADER ── */
.mobile-header {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    background: var(--dark);
    position: sticky;
    top: 0;
    z-index: 90;
    grid-column: 1 / -1;
}
.mobile-menu-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.7);
    cursor: pointer; display: flex; align-items: center; padding: 4px;
}
.mobile-brand { font-size: 15px; font-weight: 700; color: var(--white); }
.mobile-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--orange-dim); color: var(--orange);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
}
.sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 99;
}
.sidebar-overlay.visible { display: block; }

/* ── MAIN ── */
.dash-main { display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }

/* ── PAGE CONTENT ── */
.dash-page {
    padding: 40px 40px 60px;
    max-width: 980px;
    animation: fadeUp 0.2s ease forwards;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

.section-header { margin-bottom: 26px; }
.section-title  { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 4px; }
.section-sub    { font-size: 14px; color: var(--text-3); }

/* ── STAT CARDS ── */
.stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 22px;
}
.stat-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 18px 16px;
    display: flex; flex-direction: column; gap: 5px;
}
.stat-card.accent { background: var(--dark); border-color: var(--dark); }
.stat-card.accent .stat-label { color: rgba(255,255,255,0.4); }
.stat-card.accent .stat-value { color: var(--white); }
.stat-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); }
.stat-value { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.15; }

/* ── CARDS ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 13px; border-bottom: 1px solid var(--border-light); }
.card-title  { font-size: 11px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: var(--text); }
.card-link   { font-size: 12px; font-weight: 600; color: var(--orange); text-decoration: none; }
.card-link:hover { text-decoration: underline; }
.card-body   { padding: 16px 20px; }

/* ── OVERVIEW GRID ── */
.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
.overview-grid .card { margin-bottom: 0; }
.ov-row   { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ov-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.ov-sub   { font-size: 13px; color: var(--text-3); }

/* ── SERVICE CHIPS ── */
.service-chips { padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 52px; align-items: center; }
.svc-chip { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 100px; background: #f0efe9; color: #555; border: 1px solid #e4e4de; }
.svc-chip.active { background: var(--orange-dim); color: var(--orange-dark); border-color: rgba(224,90,18,0.2); }

/* ── EMPTY STATE ── */
.empty-state { font-size: 14px; color: #ccc; text-align: center; padding: 6px 0; }

/* ── BADGES ── */
.bdg { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; letter-spacing: 0.2px; padding: 3px 9px; border-radius: 100px; white-space: nowrap; font-family: 'Inter', sans-serif; }
.bdg-scheduled { background: #e8f0fe; color: #1a56c4; }
.bdg-completed  { background: #edf7f1; color: #1e8a4a; }
.bdg-cancelled  { background: #f5f5f5; color: #888; }
.bdg-paid       { background: #edf7f1; color: #1e8a4a; }
.bdg-unpaid     { background: #fef0ef; color: #d93025; }
.bdg-overdue    { background: #fef0ef; color: #d93025; }
.bdg-active     { background: var(--orange-dim); color: var(--orange-dark); }
.bdg-paused     { background: #fafae8; color: #a0880a; }
.bdg-default    { background: #f0efe9; color: #666; }

/* ── LIST TABLE ── */
.ltable { display: flex; flex-direction: column; }
.lhead {
    display: grid; grid-template-columns: 120px 1fr 1fr 100px;
    gap: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light);
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: #ccc;
}
.lrow {
    display: grid; grid-template-columns: 120px 1fr 1fr 100px;
    gap: 14px; padding: 13px 0; border-bottom: 1px solid #faf9f6;
    align-items: center; font-size: 13.5px; color: var(--text-2);
}
.lrow:last-child { border-bottom: none; }
.lrow .muted { color: var(--text-3); font-size: 13px; }
.lrow .mono  { font-variant-numeric: tabular-nums; }

/* ── SERVICES GRID ── */
.services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.svc-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px 16px; }
.svc-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.svc-card-name { font-size: 15px; font-weight: 700; color: var(--text); }
.svc-detail { font-size: 13px; color: #555; margin-bottom: 4px; line-height: 1.5; }
.svc-detail.muted { color: #aaa; }
.svc-detail strong { font-weight: 600; color: #333; }

/* ── ACCOUNT ── */
.account-card { max-width: 560px; }
.account-avatar-row { display: flex; align-items: center; gap: 16px; padding: 20px 20px 16px; border-bottom: 1px solid var(--border-light); }
.account-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--orange-dim); color: var(--orange-dark); font-size: 17px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.account-name  { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.account-since { font-size: 13px; color: var(--muted); }
.account-fields { padding: 4px 20px; }
.account-field { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid #faf9f6; }
.account-field:last-child { border-bottom: none; }
.afl { font-size: 11.5px; font-weight: 700; color: #bbb; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; }
.afv { font-size: 13.5px; color: var(--text-2); text-align: right; word-break: break-all; }
.afv.uid { font-family: monospace; font-size: 11px; color: var(--muted); }
.account-actions { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border-light); }
.btn-secondary { padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--text-2); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.btn-secondary:hover { background: var(--bg); border-color: #bbb; }
.btn-danger { padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid transparent; background: #fef0ef; color: #d93025; cursor: pointer; transition: background 0.15s; }
.btn-danger:hover { background: #fde0de; }
.acct-msg { display: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; margin: 0 20px 16px; }
.acct-msg.error   { display: block; background: #fef0ef; color: #d93025; border: 1px solid #fac8c6; }
.acct-msg.success { display: block; background: #edf7f1; color: #1e8a4a; border: 1px solid #b6dfc8; }

/* ── RESPONSIVE ── */
@media (max-width: 1060px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

@media (max-width: 860px) {
    .dash-shell { grid-template-columns: 1fr; grid-template-rows: 56px 1fr; }
    .sidebar { position: fixed; top: 0; left: -260px; height: 100%; z-index: 200; transition: left 0.25s ease; }
    .sidebar.open { left: 0; }
    .mobile-header { display: flex; }
    .dash-main { grid-column: 1; }
    .dash-page { padding: 24px 20px 48px; }
    .overview-grid { grid-template-columns: 1fr; }
    .lhead, .lrow { grid-template-columns: 110px 1fr 90px; }
    .hsm { display: none; }
}

@media (max-width: 540px) {
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-value { font-size: 17px; }
    .section-title { font-size: 22px; }
    .lhead, .lrow { grid-template-columns: 1fr 1fr; }
    .lhead span:first-child, .lrow span:first-child { display: none; }
    .account-card { max-width: 100%; }
    .account-actions { flex-direction: column; }
    .account-actions button { width: 100%; }
}
</style>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item active" href="index.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item" href="appointments.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item" href="invoices.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item" href="services.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="account.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>
    </aside>
    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">Welcome, <span id="userName">there</span>.</h1>
                <p class="section-sub">Here's a look at your account.</p>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><span class="stat-label">Next Appointment</span><span class="stat-value" id="statNextAppt">—</span></div>
                <div class="stat-card"><span class="stat-label">Active Services</span><span class="stat-value" id="statServices">—</span></div>
                <div class="stat-card"><span class="stat-label">Open Invoices</span><span class="stat-value" id="statOpenInvoices">—</span></div>
                <div class="stat-card accent"><span class="stat-label">Amount Due</span><span class="stat-value" id="statAmountDue">—</span></div>
            </div>
            <div class="overview-grid">
                <div class="card">
                    <div class="card-header"><span class="card-title">Upcoming Appointment</span><a class="card-link" href="appointments.html">View all</a></div>
                    <div class="card-body" id="overviewApptBody"><span class="loading-text">Loading…</span></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Latest Invoice</span><a class="card-link" href="invoices.html">View all</a></div>
                    <div class="card-body" id="overviewInvoiceBody"><span class="loading-text">Loading…</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">Active Services</span><a class="card-link" href="services.html">View all</a></div>
                <div class="service-chips" id="overviewServiceChips"><span class="loading-text">Loading…</span></div>
            </div>
        </div>
    </main>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="dashboard.js"></script>
<script>
initFirebase();
const auth = firebase.auth();
initSidebar();
initSignOut(auth, 'signOutBtn');

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/account/login/'); return; }
    const name = user.displayName || 'there';
    document.getElementById('userName').textContent     = name.split(' ')[0];
    document.getElementById('mobileAvatar').textContent = initials(name);
    const uid = user.uid;

    const [invoiceRows, serviceRows, jobRows] = await Promise.all([
        fetchCSV(CSV.INVOICES), fetchCSV(CSV.SERVICES), fetchCSV(CSV.JOBS)
    ]);

    const myInvoices = invoiceRows.filter(r => r[1] === uid);
    const myServices = serviceRows.filter(r => r[0] === uid);
    const myJobs     = jobRows.filter(r => r[1] === uid);

    // Next appointment stat
    const now = new Date(); now.setHours(0,0,0,0);
    const upcoming = myJobs.filter(r => {
        const s = (r[2]||'').toLowerCase();
        return new Date(r[3]) >= now && s !== 'cancelled' && s !== 'completed';
    }).sort((a,b) => new Date(a[3]) - new Date(b[3]));
    const nextJob = upcoming[0];
    document.getElementById('statNextAppt').textContent = nextJob
        ? new Date(nextJob[3]).toLocaleDateString('en-US',{month:'short',day:'numeric'})
        : 'None scheduled';

    // Active services stat
    const svcRow = myServices[0];
    const svcList = svcRow ? parseServices(svcRow[3]) : [];
    document.getElementById('statServices').textContent = svcList.length;

    // Open invoices & amount due
    const openInv = myInvoices.filter(r => {
        const s = (r[3]||'').toLowerCase();
        return s === 'unpaid' || s === 'overdue' || s === 'partial';
    });
    document.getElementById('statOpenInvoices').textContent = openInv.length;
    let totalDue = 0;
    openInv.forEach(r => {
        const t = parseLineItems(r[5]).reduce((s,i)=>s+i.lineTotal,0);
        const p = parsePayments(r[6]).reduce((s,p)=>s+p.amount,0);
        totalDue += Math.max(0, t - p);
    });
    document.getElementById('statAmountDue').textContent = fmtMoney(totalDue);

    // Upcoming appointment card
    const apptEl = document.getElementById('overviewApptBody');
    if (nextJob) {
        const svcNames = parseLineItems(nextJob[6]).map(i=>i.name).join(', ') || 'Service Visit';
        const dateStr  = new Date(nextJob[3]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const time     = nextJob[4] ? ` · ${nextJob[4]}` : '';
        apptEl.innerHTML = `<div class="ov-row"><div><p class="ov-title">${svcNames}</p><p class="ov-sub">${dateStr}${time}</p></div>${badge(nextJob[2]||'Scheduled')}</div>`;
    } else { apptEl.innerHTML = empty('No upcoming appointments.'); }

    // Latest invoice card
    const invEl = document.getElementById('overviewInvoiceBody');
    const sortedInv = [...myInvoices].sort((a,b)=>new Date(b[4])-new Date(a[4]));
    const latest = sortedInv[0];
    if (latest) {
        const items    = parseLineItems(latest[5]);
        const payments = parsePayments(latest[6]);
        const total    = items.reduce((s,i)=>s+i.lineTotal,0);
        const paid     = payments.reduce((s,p)=>s+p.amount,0);
        const balance  = Math.max(0, total - paid);
        const desc     = items.map(i=>i.name).join(', ') || 'Invoice';
        const dateStr  = new Date(latest[4]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        invEl.innerHTML = `<div class="ov-row"><div><p class="ov-title">${desc}</p><p class="ov-sub">${dateStr} · #${latest[0]}</p></div><div style="text-align:right"><p class="ov-title mono">${fmtMoney(balance||total)}</p>${badge(latest[3])}</div></div>`;
    } else { invEl.innerHTML = empty('No invoices yet.'); }

    // Service chips
    const chipsEl = document.getElementById('overviewServiceChips');
    const isActive = svcRow && (svcRow[2]||'').toLowerCase() === 'active';
    if (svcList.length) {
        chipsEl.innerHTML = svcList.map(s=>`<span class="svc-chip ${isActive?'active':''}">${s.name}</span>`).join('');
    } else { chipsEl.innerHTML = empty('No active services.'); }
});
</script>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
.acct-section{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px;}
.acct-section-header{padding:14px 20px 12px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;}
.acct-section-title{font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--text);}
.acct-section-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}

/* ── Profile display rows ── */
.profile-field{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #faf9f6;}
.profile-field:last-child{border-bottom:none;}
.pfl{font-size:11px;font-weight:700;color:#bbb;letter-spacing:0.4px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.pfv{font-size:13.5px;color:var(–text-2);text-align:right;word-break:break-all;}
.pfv.uid-style{font-family:monospace;font-size:11px;color:var(–muted);}
.pf-edit-btn{font-size:11px;font-weight:600;color:var(–orange);background:none;border:none;cursor:pointer;padding:0 0 0 10px;white-space:nowrap;flex-shrink:0;}
.profile-fields-wrap{padding:2px 20px;}

/* ── Edit profile inline form ── */
.edit-profile-form{padding:16px 20px;border-top:1px solid var(–border-light);display:flex;flex-direction:column;gap:12px;}

/* ── Form elements ── */
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;color:#bbb;}
.form-input{border:1px solid var(–border);border-radius:8px;padding:9px 12px;font-size:13.5px;font-family:‘Inter’,sans-serif;color:var(–text);background:var(–white);width:100%;transition:border-color 0.15s;}
.form-input:focus{outline:none;border-color:var(–orange);}
.form-textarea{resize:vertical;min-height:72px;}
.save-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn-save{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:‘Inter’,sans-serif;background:var(–orange);color:#fff;border:none;cursor:pointer;transition:background 0.15s;}
.btn-save:hover{background:var(–orange-dark);}
.btn-save:disabled{background:#ccc;cursor:default;}
.btn-cancel-edit{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;font-family:‘Inter’,sans-serif;border:1.5px solid var(–border);background:var(–white);color:var(–text-3);cursor:pointer;}
.save-status{font-size:12px;font-weight:500;}
.save-status.ok{color:#1e8a4a;}
.save-status.err{color:#d93025;}

/* ── Phone section — saved state vs edit state ── */
.phone-saved-display{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fafaf8;border:1px solid var(–border-light);border-radius:8px;padding:10px 14px;}
.phone-saved-value{font-size:14px;font-weight:600;color:var(–text);}
.phone-edit-wrap{display:none;}
.phone-row{display:flex;gap:8px;}
.phone-prefix{border:1px solid var(–border);border-radius:8px;padding:9px 10px;font-size:13.5px;font-family:‘Inter’,sans-serif;color:var(–text);background:#fafaf8;width:70px;flex-shrink:0;}
.phone-prefix:focus{outline:none;border-color:var(–orange);}

/* ── Contact pills ── */
.contact-pills{display:flex;gap:8px;flex-wrap:wrap;}
.contact-pill{padding:7px 16px;border-radius:100px;border:1.5px solid var(–border);font-size:13px;font-weight:600;font-family:‘Inter’,sans-serif;color:var(–text-3);background:var(–white);cursor:pointer;transition:all 0.15s;}
.contact-pill:hover{border-color:var(–orange);color:var(–orange);}
.contact-pill.selected{border-color:var(–orange);background:var(–orange-dim);color:var(–orange-dark);}

/* ── Properties ── */
.property-list{display:flex;flex-direction:column;gap:12px;}
.property-card{border:1px solid var(–border);border-radius:10px;padding:14px 16px;background:#fafaf8;display:flex;flex-direction:column;gap:10px;}
.property-card.is-primary{border-color:var(–orange);background:var(–orange-dim);}
.property-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.primary-badge{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(–orange-dark);background:rgba(224,90,18,0.15);border-radius:100px;padding:3px 10px;white-space:nowrap;}
.property-address-display{font-size:13.5px;font-weight:600;color:var(–text);}
.property-notes-display{font-size:12.5px;color:var(–text-3);line-height:1.5;}
.property-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.btn-link{background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:‘Inter’,sans-serif;color:var(–orange);padding:0;text-decoration:underline;}
/* Remove button — always neutral grey, never red */
.btn-link.remove{color:var(–text-3);}
.btn-link.remove:hover{color:#d93025;}
.primary-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(–text-3);font-weight:500;cursor:pointer;user-select:none;}
.primary-toggle input[type=checkbox]{accent-color:var(–orange);width:14px;height:14px;cursor:pointer;}
.add-property-form{border:1.5px dashed var(–border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.btn-add-property{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:‘Inter’,sans-serif;border:1.5px solid var(–border);background:var(–white);color:var(–text-2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:border-color 0.15s,color 0.15s;}
.btn-add-property:hover{border-color:var(–orange);color:var(–orange);}
.btn-cancel-sm{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;font-family:‘Inter’,sans-serif;border:1.5px solid var(–border);background:var(–white);color:var(–text-3);cursor:pointer;}
.property-edit-form{display:flex;flex-direction:column;gap:10px;}

/* ── Role badge ── */
.role-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:#f0efe9;color:#555;letter-spacing:0.2px;}
.role-badge.staff{background:#e8f0fe;color:#1a56c4;}
.role-badge.admin{background:var(–orange-dim);color:var(–orange-dark);}

/* ── Account actions ── */
.acct-actions-wrap{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(–border-light);flex-wrap:wrap;}
.btn-secondary{padding:8px 16px;border-radius:8px;font-family:‘Inter’,sans-serif;font-size:13px;font-weight:600;border:1.5px solid var(–border);background:var(–white);color:var(–text-2);cursor:pointer;}
.btn-secondary:hover{background:var(–bg);border-color:#bbb;}
.btn-danger-acct{padding:8px 16px;border-radius:8px;font-family:‘Inter’,sans-serif;font-size:13px;font-weight:600;border:1.5px solid transparent;background:#fef0ef;color:#d93025;cursor:pointer;}
.btn-danger-acct:hover{background:#fde0de;}
.acct-msg{display:none;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;margin:0 20px 14px;}
.acct-msg.error{display:block;background:#fef0ef;color:#d93025;border:1px solid #fac8c6;}
.acct-msg.success{display:block;background:#edf7f1;color:#1e8a4a;border:1px solid #b6dfc8;}

/* ── Avatar ── */
.acct-avatar-row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(–border-light);}
.acct-avatar{width:50px;height:50px;border-radius:50%;background:var(–orange-dim);color:var(–orange-dark);font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.acct-name-block{}
.acct-display-name{font-size:16px;font-weight:700;color:var(–text);margin-bottom:2px;}
.acct-since{font-size:13px;color:var(–muted);}

@media(max-width:540px){
.phone-row{flex-direction:column;}
.phone-prefix{width:100%;}
.acct-actions-wrap{flex-direction:column;}
.acct-actions-wrap button{width:100%;}
}
</style>

</head>

<script>
BWD.initFirebase();
var auth = firebase.auth();
var db   = firebase.firestore();

BWD.initSidebar();
BWD.initSignOut(auth);

function initials(n){ return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?'; }
function formatPhone(raw){ var d=raw.replace(/\D/g,'').slice(0,10); if(d.length<=3)return d.length?'('+d:''; if(d.length<=6)return '('+d.slice(0,3)+') '+d.slice(3); return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6); }
document.getElementById('phoneInput').addEventListener('input',function(){ this.value=formatPhone(this.value); });

// Phone edit toggle
function openPhoneEdit(){
    document.getElementById('phoneSavedDisplay').style.display='none';
    document.getElementById('phoneEditWrap').style.display='block';
    document.getElementById('phoneInput').focus();
}
function showPhoneSaved(full){
    document.getElementById('phoneSavedText').textContent = full || 'Not set';
    document.getElementById('phoneSavedDisplay').style.display='flex';
    document.getElementById('phoneEditWrap').style.display='none';
}

// Contact pills
var selectedMethod='';
document.querySelectorAll('.contact-pill').forEach(function(pill){
    pill.addEventListener('click',function(){
        document.querySelectorAll('.contact-pill').forEach(function(p){p.classList.remove('selected');});
        pill.classList.add('selected');
        selectedMethod=pill.dataset.method;
    });
});

// Edit profile toggle
function openEditProfile(){
    document.getElementById('editProfileForm').style.display='flex';
    document.getElementById('editName').value = document.getElementById('afName').textContent;
    document.getElementById('editEmail').value = document.getElementById('afEmail').textContent;
    document.getElementById('editName').focus();
}
function closeEditProfile(){
    document.getElementById('editProfileForm').style.display='none';
    document.getElementById('profileStatus').textContent='';
}

// Properties state
var properties=[];
var activeUid='';

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function firestoreSave(data, statusEl, cb){
    if(!activeUid){if(statusEl){statusEl.textContent='Not signed in.';statusEl.className='save-status err';}return;}
    if(statusEl){statusEl.textContent='Saving…';statusEl.className='save-status';}
    db.collection('customers').doc(activeUid).set(data,{merge:true})
        .then(function(){
            if(statusEl){statusEl.textContent='Saved!';statusEl.className='save-status ok';}
            if(cb)cb(null);
            setTimeout(function(){if(statusEl&&statusEl.textContent==='Saved!')statusEl.textContent='';},3000);
        })
        .catch(function(e){
            console.error('Firestore error:',e);
            if(statusEl){statusEl.textContent='Error: '+(e.message||'Permission denied');statusEl.className='save-status err';}
            if(cb)cb(e);
        });
}

function renderProperties(){
    var list=document.getElementById('propertyList');
    if(!properties.length){list.innerHTML='<p style="font-size:13px;color:#ccc;text-align:center;padding:6px 0;">No properties added yet.</p>';return;}
    list.innerHTML='';
    properties.forEach(function(prop){
        var card=document.createElement('div');
        card.className='property-card'+(prop.primary?' is-primary':'');
        card.id='prop-card-'+prop.id;
        card.innerHTML=
            '<div class="property-card-top">'+
                '<span class="property-address-display">'+prop.address+'</span>'+
                (prop.primary?'<span class="primary-badge">Primary</span>':'')+
            '</div>'+
            (prop.notes?'<p class="property-notes-display">'+prop.notes+'</p>':'')+
            '<div class="property-actions">'+
                (!prop.primary?'<button class="btn-link" onclick="setPrimary(\''+prop.id+'\')">Set as Primary</button>':'')+
                '<button class="btn-link" onclick="editProperty(\''+prop.id+'\')">Edit</button>'+
                '<button class="btn-link remove" onclick="removeProperty(\''+prop.id+'\')">Remove</button>'+
            '</div>';
        list.appendChild(card);
    });
}

function setPrimary(id){
    properties=properties.map(function(p){return Object.assign({},p,{primary:p.id===id});});
    firestoreSave({properties:properties},null,function(){renderProperties();});
}
function removeProperty(id){
    var prop=properties.find(function(p){return p.id===id;});
    if(!prop)return;
    if(prop.primary&&properties.length===1){alert('Add another property before removing the only one.');return;}
    if(prop.primary){var others=properties.filter(function(p){return p.id!==id;});if(others.length)others[0].primary=true;}
    properties=properties.filter(function(p){return p.id!==id;});
    firestoreSave({properties:properties},null,function(){renderProperties();});
}
function editProperty(id){
    var prop=properties.find(function(p){return p.id===id;});if(!prop)return;
    var card=document.getElementById('prop-card-'+id);
    card.innerHTML=
        '<div class="property-edit-form">'+
            '<div class="form-row"><label class="form-label">Address</label>'+
            '<input class="form-input" id="ea-'+id+'" type="text" value="'+prop.address+'"></div>'+
            '<div class="form-row"><label class="form-label">Property Notes</label>'+
            '<textarea class="form-input form-textarea" id="en-'+id+'">'+prop.notes+'</textarea></div>'+

```
        '<div class="property-actions" style="align-items:center;">'+
            '<label class="primary-toggle">'+
                '<input type="checkbox" id="ep-'+id+'" '+(prop.primary?'checked':'')+
                (prop.primary&&properties.length===1?' disabled':'')+'>Primary</label>'+
            '<button class="btn-save" onclick="saveEditProperty(\''+id+'\')">Save</button>'+
            '<button class="btn-cancel-sm" onclick="renderProperties()">Cancel</button>'+
            '<span id="es-'+id+'" class="save-status"></span>'+
        '</div>'+
    '</div>';
```

}
function saveEditProperty(id){
var addr=(document.getElementById(‘ea-’+id)||{}).value||’’;
var notes=(document.getElementById(‘en-’+id)||{}).value||’’;
var isPrimary=document.getElementById(‘ep-’+id)?document.getElementById(‘ep-’+id).checked:false;
addr=addr.trim();
if(!addr){alert(‘Please enter an address.’);return;}
if(isPrimary){properties=properties.map(function(p){return Object.assign({},p,{primary:p.id===id});});}
properties=properties.map(function(p){
if(p.id!==id)return p;
return Object.assign({},p,{address:addr,notes:notes.trim(),primary:isPrimary||(p.primary&&properties.length===1)});
});
if(!properties.some(function(p){return p.primary;}))properties[0].primary=true;
firestoreSave({properties:properties},document.getElementById(‘es-’+id),function(err){
if(!err)setTimeout(function(){renderProperties();},700);
});
}

// Add property form
document.getElementById(‘showAddPropBtn’).addEventListener(‘click’,function(){
document.getElementById(‘addPropertyFormWrap’).style.display=‘block’;
document.getElementById(‘showAddPropBtn’).style.display=‘none’;
document.getElementById(‘newPropAddress’).focus();
});
document.getElementById(‘cancelPropBtn’).addEventListener(‘click’,function(){
document.getElementById(‘addPropertyFormWrap’).style.display=‘none’;
document.getElementById(‘showAddPropBtn’).style.display=‘inline-flex’;
document.getElementById(‘newPropAddress’).value=’’;
document.getElementById(‘newPropNotes’).value=’’;
document.getElementById(‘propAddStatus’).textContent=’’;
});

// ── Auth ──

// Load role first, then build nav
db.collection('customers').doc(user.uid).get().then(function(doc){
    var data=doc.exists?doc.data():{};
    var role=data.role||'Homeowner';
    var isStaff=BWD.isStaff(role);

    // Inject nav
    BWD.injectNav('account','../../../',role);

    // Profile display
    var name=user.displayName||'User';
    document.getElementById('mobileAvatar').textContent=initials(name);
    document.getElementById('accountAvatar').textContent=initials(name);
    document.getElementById('accountName').textContent=name;
    document.getElementById('afName').textContent=name;
    document.getElementById('afEmail').textContent=user.email||'—';
    document.getElementById('afUid').textContent=user.uid;
    document.getElementById('afProvider').textContent=(user.providerData[0]&&user.providerData[0].providerId==='google.com')?'Google':'Email & Password';

    // Role — only show if not Homeowner
    if(role && role!=='Homeowner'){
        var roleEl=document.getElementById('afRole');
        var badgeClass=isStaff?(role==='Administrator'?'admin':'staff'):'';
        roleEl.innerHTML='<span class="role-badge '+badgeClass+'">'+role+'</span>';
        document.getElementById('roleRow').style.display='flex';
    }

    // Member since
    if(data.createdAt){
        var d=data.createdAt.toDate?data.createdAt.toDate():new Date(data.createdAt);
        document.getElementById('accountSince').textContent='Member since '+d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    }

    // Phone — show saved state if exists
    if(data.phoneCountry)document.getElementById('phoneCountry').value=data.phoneCountry;
    if(data.phoneNumber)document.getElementById('phoneInput').value=data.phoneNumber;
    if(data.phone){
        showPhoneSaved(data.phone);
    } else {
        // No phone saved yet — show edit mode
        document.getElementById('phoneEditWrap').style.display='block';
    }

    // Contact method
    if(data.preferredContact){
        selectedMethod=data.preferredContact;
        document.querySelectorAll('.contact-pill').forEach(function(p){
            p.classList.toggle('selected',p.dataset.method===data.preferredContact);
        });
    }

    // Properties — hide for staff
    if(isStaff){
        document.getElementById('propertiesSection').style.display='none';
    } else {
        if(data.properties&&data.properties.length)properties=data.properties;
        renderProperties();
    }

// ── Save contact ──
document.getElementById('saveContactBtn').onclick=function(){
    var country=document.getElementById('phoneCountry').value.trim()||'+1';
    var number=document.getElementById('phoneInput').value.trim();
    var full=number?(country+' '+number):'';
    var btn=document.getElementById('saveContactBtn');
    btn.disabled=true;
    firestoreSave({phone:full,phoneCountry:country,phoneNumber:number,preferredContact:selectedMethod},
        document.getElementById('contactStatus'),
        function(err){
            btn.disabled=false;
            if(!err&&full) showPhoneSaved(full);
        });
};

// ── Add property ──
document.getElementById('savePropBtn').onclick=function(){
    var addr=document.getElementById('newPropAddress').value.trim();
    var notes=document.getElementById('newPropNotes').value.trim();
    var status=document.getElementById('propAddStatus');
    if(!addr){status.textContent='Please enter an address.';status.className='save-status err';return;}
    var btn=document.getElementById('savePropBtn');
    btn.disabled=true;
    var newProp={id:genId(),address:addr,notes:notes,primary:properties.length===0};
    properties.push(newProp);
    firestoreSave({properties:properties},status,function(err){
        btn.disabled=false;
        if(!err){
            renderProperties();
            setTimeout(function(){
                document.getElementById('addPropertyFormWrap').style.display='none';
                document.getElementById('showAddPropBtn').style.display='inline-flex';
                document.getElementById('newPropAddress').value='';
                document.getElementById('newPropNotes').value='';
                status.textContent='';
            },800);
        } else { properties.pop(); }
    });
};

// ── Save profile ──
document.getElementById('saveProfileBtn').onclick=async function(){
    var newName=document.getElementById('editName').value.trim();
    var newEmail=document.getElementById('editEmail').value.trim();
    var statusEl=document.getElementById('profileStatus');
    if(!newName&&!newEmail){statusEl.textContent='Nothing to update.';statusEl.className='save-status err';return;}
    var btn=document.getElementById('saveProfileBtn');
    btn.disabled=true;statusEl.textContent='Saving…';statusEl.className='save-status';
    try{
        if(newName&&newName!==user.displayName){
            await user.updateProfile({displayName:newName});
            document.getElementById('afName').textContent=newName;
            document.getElementById('accountName').textContent=newName;
            document.getElementById('accountAvatar').textContent=initials(newName);
            document.getElementById('mobileAvatar').textContent=initials(newName);
        }
        if(newEmail&&newEmail!==user.email){
            await user.updateEmail(newEmail);
            document.getElementById('afEmail').textContent=newEmail;
        }
        await db.collection('customers').doc(user.uid).set({displayName:newName||user.displayName},{ merge:true});
        statusEl.textContent='Saved!';statusEl.className='save-status ok';
        setTimeout(function(){closeEditProfile();},1200);
    }catch(e){
        console.error('Profile update error:',e);
        statusEl.textContent='Error: '+(e.message||'Failed');statusEl.className='save-status err';
    }
    btn.disabled=false;
};

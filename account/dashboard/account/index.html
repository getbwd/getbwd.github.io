<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
/* ── Section cards ── */
.acct-section { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
.acct-section-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border-light); }
.acct-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: var(--text); }
.acct-section-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }

/* ── Form fields ── */
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: #bbb; }
.form-input { border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--text); background: var(--white); width: 100%; transition: border-color 0.15s; }
.form-input:focus { outline: none; border-color: var(--orange); }
.form-input:disabled { background: #fafaf8; color: var(--muted); cursor: default; }
.form-textarea { resize: vertical; min-height: 72px; }

/* ── Phone row ── */
.phone-row { display: flex; gap: 8px; }
.phone-prefix { border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 13.5px; font-family: 'Inter', sans-serif; color: var(--text); background: #fafaf8; width: 80px; flex-shrink: 0; }
.phone-prefix:focus { outline: none; border-color: var(--orange); }

/* ── Contact method pills ── */
.contact-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.contact-pill { padding: 7px 16px; border-radius: 100px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; color: var(--text-3); background: var(--white); cursor: pointer; transition: all 0.15s; }
.contact-pill:hover { border-color: var(--orange); color: var(--orange); }
.contact-pill.selected { border-color: var(--orange); background: var(--orange-dim); color: var(--orange-dark); }

/* ── Save row ── */
.save-row { display: flex; align-items: center; gap: 12px; }
.btn-save { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; background: var(--orange); color: #fff; border: none; cursor: pointer; transition: background 0.15s; }
.btn-save:hover { background: var(--orange-dark); }
.btn-save:disabled { background: #ccc; cursor: default; }
.save-status { font-size: 12px; font-weight: 500; }
.save-status.ok  { color: #1e8a4a; }
.save-status.err { color: #d93025; }

/* ── Property cards ── */
.property-list { display: flex; flex-direction: column; gap: 12px; }
.property-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; background: #fafaf8; display: flex; flex-direction: column; gap: 10px; }
.property-card.is-primary { border-color: var(--orange); background: var(--orange-dim); }
.property-card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.primary-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--orange-dark); background: rgba(224,90,18,0.15); border-radius: 100px; padding: 3px 10px; white-space: nowrap; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 6px; border-radius: 6px; font-family: 'Inter', sans-serif; transition: background 0.1s, color 0.1s; }
.btn-icon:hover { background: #f0efe9; color: #d93025; }
.property-address-display { font-size: 13.5px; font-weight: 600; color: var(--text); }
.property-notes-display { font-size: 12.5px; color: var(--text-3); line-height: 1.5; }
.property-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn-link { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; color: var(--orange); padding: 0; text-decoration: underline; }
.btn-link.danger { color: #d93025; }
.primary-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); font-weight: 500; cursor: pointer; user-select: none; }
.primary-toggle input[type=checkbox] { accent-color: var(--orange); width: 14px; height: 14px; cursor: pointer; }

/* ── Add property form ── */
.add-property-form { border: 1.5px dashed var(--border); border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.add-property-form .form-row { gap: 4px; }
.btn-add-property { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; border: 1.5px solid var(--border); background: var(--white); color: var(--text-2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
.btn-add-property:hover { border-color: var(--orange); color: var(--orange); }
.btn-cancel { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; border: 1.5px solid var(--border); background: var(--white); color: var(--text-3); cursor: pointer; }
.btn-cancel:hover { background: #f5f5f5; }

/* ── Existing profile fields ── */
.account-avatar-row { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border-light); }
.account-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--orange-dim); color: var(--orange-dark); font-size: 17px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.account-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.account-since { font-size: 13px; color: var(--muted); }
.account-fields { padding: 4px 20px; }
.account-field { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 12px 0; border-bottom: 1px solid #faf9f6; }
.account-field:last-child { border-bottom: none; }
.afl { font-size: 11.5px; font-weight: 700; color: #bbb; letter-spacing: 0.3px; text-transform: uppercase; white-space: nowrap; }
.afv { font-size: 13.5px; color: var(--text-2); text-align: right; word-break: break-all; }
.afv.uid { font-family: monospace; font-size: 11px; color: var(--muted); }
.account-actions-row { display: flex; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border-light); }
.btn-secondary { padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--white); color: var(--text-2); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.btn-secondary:hover { background: var(--bg); border-color: #bbb; }
.btn-danger { padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border: 1.5px solid transparent; background: #fef0ef; color: #d93025; cursor: pointer; transition: background 0.15s; }
.btn-danger:hover { background: #fde0de; }
.acct-msg { display: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; margin: 0 20px 16px; }
.acct-msg.error   { display: block; background: #fef0ef; color: #d93025; border: 1px solid #fac8c6; }
.acct-msg.success { display: block; background: #edf7f1; color: #1e8a4a; border: 1px solid #b6dfc8; }

/* ── Edit property inline ── */
.property-edit-form { display: flex; flex-direction: column; gap: 10px; }

@media(max-width:540px){
    .phone-row { flex-direction: column; }
    .phone-prefix { width: 100%; }
    .account-actions-row { flex-direction: column; }
    .account-actions-row button { width: 100%; }
}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth=firebase.auth();
var db=firebase.firestore();

// Sign out
function doSignOut(){auth.signOut().then(function(){window.location.href='/account/login/';});}
document.getElementById('signOutBtn').addEventListener('click',doSignOut);
document.getElementById('signOutBtn2').addEventListener('click',doSignOut);

// Mobile sidebar
document.getElementById('mobileMenuBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('visible');});
document.getElementById('sidebarOverlay').addEventListener('click',function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('visible');});

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}

// ── Phone formatting ──
function formatPhone(raw){
    var digits=raw.replace(/\D/g,'').slice(0,10);
    if(digits.length<=3)return digits.length?'('+digits:'';
    if(digits.length<=6)return '('+digits.slice(0,3)+') '+digits.slice(3);
    return '('+digits.slice(0,3)+') '+digits.slice(3,6)+'-'+digits.slice(6);
}
var phoneInput=document.getElementById('phoneInput');
phoneInput.addEventListener('input',function(){
    var pos=phoneInput.selectionStart;
    var formatted=formatPhone(phoneInput.value);
    phoneInput.value=formatted;
});

// ── Contact method pills ──
var selectedMethod='';
document.querySelectorAll('.contact-pill').forEach(function(pill){
    pill.addEventListener('click',function(){
        document.querySelectorAll('.contact-pill').forEach(function(p){p.classList.remove('selected');});
        pill.classList.add('selected');
        selectedMethod=pill.dataset.method;
    });
});

// ── Save contact info ──
document.getElementById('saveContactBtn').addEventListener('click',async function(){
    var btn=document.getElementById('saveContactBtn');
    var status=document.getElementById('contactStatus');
    var country=document.getElementById('phoneCountry').value.trim()||'+1';
    var number=document.getElementById('phoneInput').value.trim();
    var fullPhone=number?(country+' '+number):'';
    btn.disabled=true; status.textContent='Saving…'; status.className='save-status';
    try{
        await db.collection('customers').doc(auth.currentUser.uid).set({
            phone: fullPhone,
            phoneCountry: country,
            phoneNumber: number,
            preferredContact: selectedMethod
        },{merge:true});
        status.textContent='Saved!'; status.className='save-status ok';
    }catch(e){
        status.textContent='Error saving. Try again.'; status.className='save-status err';
    }
    btn.disabled=false;
    setTimeout(function(){status.textContent='';},3000);
});

// ── Properties ──
var properties=[];  // array of {id, address, notes, primary}
var currentUid='';

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function renderProperties(){
    var list=document.getElementById('propertyList');
    if(!properties.length){list.innerHTML='<p style="font-size:13px;color:#ccc;text-align:center;padding:6px 0;">No properties added yet.</p>';return;}
    list.innerHTML='';
    properties.forEach(function(prop,idx){
        var card=document.createElement('div');
        card.className='property-card'+(prop.primary?' is-primary':'');
        card.id='prop-card-'+prop.id;

        // View mode HTML
        var hasOnePrimary=properties.filter(function(p){return p.primary;}).length===1;
        var canUnprimary=!(prop.primary&&hasOnePrimary&&properties.length===1);

        card.innerHTML=
            '<div class="property-card-top">'+
                '<span class="property-address-display">'+prop.address+'</span>'+
                (prop.primary?'<span class="primary-badge">Primary</span>':'')+
            '</div>'+
            (prop.notes?'<p class="property-notes-display">'+prop.notes+'</p>':'')+
            '<div class="property-actions">'+
                (!prop.primary?'<button class="btn-link" onclick="setPrimary(\''+prop.id+'\')">Set as Primary</button>':'')+''+
                '<button class="btn-link" onclick="editProperty(\''+prop.id+'\')">Edit</button>'+
                '<button class="btn-link danger" onclick="removeProperty(\''+prop.id+'\')">Remove</button>'+
            '</div>';

        list.appendChild(card);
    });
}

function setPrimary(id){
    properties=properties.map(function(p){return Object.assign({},p,{primary:p.id===id});});
    saveProperties();
    renderProperties();
}

function removeProperty(id){
    var prop=properties.find(function(p){return p.id===id;});
    if(!prop)return;
    if(prop.primary&&properties.length===1){alert('You cannot remove your only property. Add another property first.');return;}
    if(prop.primary){
        // Auto-assign primary to next
        var others=properties.filter(function(p){return p.id!==id;});
        if(others.length)others[0].primary=true;
    }
    properties=properties.filter(function(p){return p.id!==id;});
    saveProperties();
    renderProperties();
}

function editProperty(id){
    var prop=properties.find(function(p){return p.id===id;});
    if(!prop)return;
    var card=document.getElementById('prop-card-'+id);
    card.innerHTML=
        '<div class="property-edit-form">'+
            '<div class="form-row">'+
                '<label class="form-label">Address</label>'+
                '<input class="form-input" id="edit-addr-'+id+'" type="text" value="'+prop.address+'">'+
            '</div>'+
            '<div class="form-row">'+
                '<label class="form-label">Property Notes</label>'+
                '<textarea class="form-input form-textarea" id="edit-notes-'+id+'">'+prop.notes+'</textarea>'+
            '</div>'+
            '<div class="property-actions" style="align-items:center;">'+
                '<label class="primary-toggle">'+
                    '<input type="checkbox" id="edit-primary-'+id+'" '+(prop.primary?'checked':'')+' '+(prop.primary&&properties.length===1?'disabled':'')+'>'+
                    'Primary property'+
                '</label>'+
                '<button class="btn-save" onclick="saveEditProperty(\''+id+'\')">Save</button>'+
                '<button class="btn-cancel" onclick="cancelEdit(\''+id+'\')">Cancel</button>'+
                '<span id="edit-status-'+id+'" class="save-status"></span>'+
            '</div>'+
        '</div>';
}

function cancelEdit(id){renderProperties();}

function saveEditProperty(id){
    var addrEl=document.getElementById('edit-addr-'+id);
    var notesEl=document.getElementById('edit-notes-'+id);
    var primaryEl=document.getElementById('edit-primary-'+id);
    if(!addrEl)return;
    var newAddr=addrEl.value.trim();
    if(!newAddr){alert('Please enter an address.');return;}
    var newNotes=notesEl?notesEl.value.trim():'';
    var newPrimary=primaryEl?primaryEl.checked:false;

    // If setting this as primary, unset others
    if(newPrimary){
        properties=properties.map(function(p){return Object.assign({},p,{primary:p.id===id});});
    }

    properties=properties.map(function(p){
        if(p.id!==id)return p;
        return Object.assign({},p,{address:newAddr,notes:newNotes,primary:newPrimary||(p.primary&&properties.length===1)});
    });

    // Ensure at least one primary
    var hasPrimary=properties.some(function(p){return p.primary;});
    if(!hasPrimary)properties[0].primary=true;

    var statusEl=document.getElementById('edit-status-'+id);
    if(statusEl){statusEl.textContent='Saving…';statusEl.className='save-status';}
    saveProperties(function(){
        if(statusEl){statusEl.textContent='Saved!';statusEl.className='save-status ok';}
        setTimeout(function(){renderProperties();},600);
    });
}

async function saveProperties(cb){
    try{
        await db.collection('customers').doc(currentUid).set({properties:properties},{merge:true});
        if(cb)cb();
    }catch(e){console.error('Error saving properties',e);}
}

// Add property form toggle
document.getElementById('showAddPropBtn').addEventListener('click',function(){
    document.getElementById('addPropertyFormWrap').style.display='block';
    document.getElementById('showAddPropBtn').style.display='none';
    document.getElementById('newPropAddress').focus();
});
document.getElementById('cancelPropBtn').addEventListener('click',function(){
    document.getElementById('addPropertyFormWrap').style.display='none';
    document.getElementById('showAddPropBtn').style.display='flex';
    document.getElementById('newPropAddress').value='';
    document.getElementById('newPropNotes').value='';
    document.getElementById('propAddStatus').textContent='';
});

document.getElementById('savePropBtn').addEventListener('click',async function(){
    var addr=document.getElementById('newPropAddress').value.trim();
    var notes=document.getElementById('newPropNotes').value.trim();
    var status=document.getElementById('propAddStatus');
    if(!addr){status.textContent='Please enter an address.';status.className='save-status err';return;}
    var btn=document.getElementById('savePropBtn');
    btn.disabled=true; status.textContent='Saving…'; status.className='save-status';

    // First property auto-primary; otherwise not primary by default
    var isPrimary=properties.length===0;
    var newProp={id:genId(),address:addr,notes:notes,primary:isPrimary};
    properties.push(newProp);

    try{
        await db.collection('customers').doc(currentUid).set({properties:properties},{merge:true});
        status.textContent='Property added!'; status.className='save-status ok';
        renderProperties();
        setTimeout(function(){
            document.getElementById('addPropertyFormWrap').style.display='none';
            document.getElementById('showAddPropBtn').style.display='flex';
            document.getElementById('newPropAddress').value='';
            document.getElementById('newPropNotes').value='';
            status.textContent='';
        },800);
    }catch(e){
        status.textContent='Error saving. Try again.'; status.className='save-status err';
        properties.pop(); // revert
    }
    btn.disabled=false;
});

// ── Password reset ──
document.getElementById('changePasswordBtn').addEventListener('click',async function(){
    var msgEl=document.getElementById('accountMessage');
    try{
        await auth.sendPasswordResetEmail(auth.currentUser.email);
        msgEl.textContent='Password reset email sent. Check your inbox.';
        msgEl.className='acct-msg success';
    }catch(e){
        msgEl.textContent='Failed to send reset email. Try again.';
        msgEl.className='acct-msg error';
    }
});

// ── Auth gate & data load ──
auth.onAuthStateChanged(async function(user){
    if(!user){window.location.href='/account/login/';return;}
    currentUid=user.uid;
    var name=user.displayName||'User';
    document.getElementById('mobileAvatar').textContent=initials(name);
    document.getElementById('accountAvatar').textContent=initials(name);
    document.getElementById('accountName').textContent=name;
    document.getElementById('afName').textContent=name;
    document.getElementById('afEmail').textContent=user.email||'—';
    document.getElementById('afUid').textContent=user.uid;
    document.getElementById('afProvider').textContent=(user.providerData[0]&&user.providerData[0].providerId==='google.com')?'Google':'Email & Password';

    try{
        var doc=await db.collection('customers').doc(user.uid).get();
        var data=doc.exists?doc.data():{};

        // Member since
        if(data.createdAt){
            var d=data.createdAt.toDate?data.createdAt.toDate():new Date(data.createdAt);
            document.getElementById('accountSince').textContent='Member since '+d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
        }

        // Phone
        if(data.phoneCountry)document.getElementById('phoneCountry').value=data.phoneCountry;
        if(data.phoneNumber)document.getElementById('phoneInput').value=data.phoneNumber;

        // Contact method
        if(data.preferredContact){
            selectedMethod=data.preferredContact;
            document.querySelectorAll('.contact-pill').forEach(function(p){
                p.classList.toggle('selected',p.dataset.method===data.preferredContact);
            });
        }

        // Properties
        if(data.properties&&data.properties.length){
            properties=data.properties;
        }
        renderProperties();

    }catch(e){
        console.error('Error loading customer data',e);
        renderProperties();
    }
});
</script>
</body>
</html>

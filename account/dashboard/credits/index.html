.credit-list{display:flex;flex-direction:column;gap:14px;}
.credit-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.credit-card.expired{opacity:0.55;}
.credit-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px;}
.credit-header-left{flex:1;min-width:0;}
.credit-type-label{font-size:10.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.credit-amount{font-size:28px;font-weight:800;color:var(--text);line-height:1;}
.credit-amount.discount{color:var(--orange-dark);}
.credit-amount.cash{color:#1e8a4a;}
.credit-amount-sub{font-size:12px;color:var(--text-3);margin-top:3px;}
.credit-header-right{flex-shrink:0;text-align:right;}
.credit-expire{font-size:12px;color:var(--text-3);margin-top:4px;}
.credit-expire.expiring{color:#a0880a;font-weight:600;}
.credit-expire.expired-text{color:#d93025;}
.credit-expire.never{color:#1e8a4a;}
.empty-credits{text-align:center;padding:48px 20px;}
.empty-credits-icon{font-size:40px;margin-bottom:12px;}
.empty-credits-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-credits-sub{font-size:13px;color:var(--text-3);}
.credits-summary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.summary-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;}
.summary-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--muted);}
.summary-value{font-size:22px;font-weight:800;color:var(--text);}
.summary-value.green{color:#1e8a4a;}
.summary-value.orange{color:var(--orange-dark);}
@media(max-width:480px){.credits-summary{grid-template-columns:1fr;}}
</style>

<script>
var BWD=window.BWD||{};
BWD.STAFF_ROLES=['Field Tech','Lead Tech','Operations Manager','Administrator'];
BWD.isStaff=function(r){return BWD.STAFF_ROLES.indexOf(r)!==-1;};
BWD.buildNav=function(active,role){
    var I='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">';
    var icons={
        overview:   I+'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        appointments:I+'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
        invoices:   I+'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
        services:   I+'<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
        credits:    I+'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
        account:    I+'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'
    };
    var labels={overview:'Overview',appointments:'Appointments',invoices:'Invoices',services:'My Services',credits:'Credits & Deals',account:'Account'};
    var cust=['overview','appointments','invoices','services','credits','account'];
    var staff=['appointments','invoices','account'];
    var hrefs={
        overview:'/account/dashboard/',appointments:'/account/dashboard/appointments/',
        invoices:'/account/dashboard/invoices/',services:'/account/dashboard/services/',
        credits:'/account/dashboard/credits/',account:'/account/dashboard/account/'
    };
    var items=BWD.isStaff(role)?staff:cust;
    return items.map(function(id){
        return '<a class="nav-item'+(id===active?' active':'')+'" href="'+hrefs[id]+'">'+icons[id]+labels[id]+'</a>';
    }).join('');
};
BWD.injectNav=function(active,role){
    var n=document.getElementById('sidebarNav');
    if(n)n.innerHTML=BWD.buildNav(active,role);
};
BWD.initSidebar=function(){
    var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay'),btn=document.getElementById('mobileMenuBtn');
    if(btn)btn.addEventListener('click',function(){sb.classList.add('open');ov.classList.add('visible');});
    if(ov)ov.addEventListener('click',function(){sb.classList.remove('open');ov.classList.remove('visible');});
};
BWD.initSignOut=function(auth){
    ['signOutBtn','signOutBtn2'].forEach(function(id){
        var el=document.getElementById(id);
        if(el)el.addEventListener('click',function(){auth.signOut().then(function(){window.location.href='/account/login/';});});
    });
};
</script>

<script>
if(!firebase.apps.length){firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',
    authDomain:'bwd-accounts.firebaseapp.com',

var auth = firebase.auth();
var db   = firebase.firestore();
BWD.initSidebar();
BWD.initSignOut(auth);

var CSV_CREDITS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPOxUpuo-X0UG1qYHSxfl1ofLBMQXoydcUPbrHkSTeWfjJFr9xqdIp2ekfjIZAPrsbIMQO2rvt8fyd/pub?output=csv';

function parseCSV(text){
    var rows=[];var lines=text.trim().split('\n');
    for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;
        for(var i=0;i<lines[l].length;i++){var c=lines[l][i];
            if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}
        cols.push(cur.trim());rows.push(cols);}return rows;}

async function cachedCSV(key,url){
    var ck='bwd_csv_'+key;var cached=sessionStorage.getItem(ck);
    if(cached){try{return JSON.parse(cached);}catch(e){}}
    var res=await fetch(url);var text=await res.text();
    var rows=parseCSV(text).slice(1);
    try{sessionStorage.setItem(ck,JSON.stringify(rows));}catch(e){}
    return rows;}

function fmtDate(str){
    if(!str||str.trim().toLowerCase()==='indf')return null;
    try{return new Date(str).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return str;}
}

function daysUntil(str){
    if(!str||str.trim().toLowerCase()==='indf')return Infinity;
    var d=new Date(str);var now=new Date();now.setHours(0,0,0,0);
    return Math.floor((d-now)/(1000*60*60*24));
}

function renderCredits(credits){
    var container=document.getElementById('pageContent');
    if(!credits.length){
        container.innerHTML=
            '<div class="empty-credits">'+
                '<div class="empty-credits-icon">🎁</div>'+
                '<p class="empty-credits-title">No credits or deals yet</p>'+
                '<p class="empty-credits-sub">When BWD adds a credit or discount to your account, it will appear here.</p>'+
            '</div>';
        return;
    }

    var today=new Date();today.setHours(0,0,0,0);

    // Separate active vs expired
    var active=credits.filter(function(c){
        var days=daysUntil(c.expireDate);
        return days>=0;
    });
    var expired=credits.filter(function(c){
        var days=daysUntil(c.expireDate);
        return days<0;
    });

    // Summary stats
    var totalCash=0,totalDiscount=0;
    active.forEach(function(c){
        if(c.type.toLowerCase()==='amount')totalCash+=c.amount;
        if(c.type.toLowerCase()==='discount')totalDiscount=Math.max(totalDiscount,c.amount);
    });

    var summaryHTML='';
    if(active.length){
        summaryHTML='<div class="credits-summary">';
        if(totalCash>0) summaryHTML+='<div class="summary-card"><span class="summary-label">Account Credit</span><span class="summary-value green">$'+totalCash.toFixed(2)+'</span></div>';
        if(totalDiscount>0) summaryHTML+='<div class="summary-card"><span class="summary-label">Best Active Discount</span><span class="summary-value orange">'+totalDiscount+'% off</span></div>';
        summaryHTML+='</div>';
    }

    function renderCard(c,isExpired){
        var days=daysUntil(c.expireDate);
        var isDiscount=c.type.toLowerCase()==='discount';
        var expStr='';
        var expClass='';
        if(c.expireDate&&c.expireDate.trim().toLowerCase()==='indf'){
            expStr='Never expires';expClass='never';
        } else if(isExpired){
            expStr='Expired '+fmtDate(c.expireDate);expClass='expired-text';
        } else if(days<=7){
            expStr='Expires in '+days+' day'+(days===1?'':'s');expClass='expiring';
        } else {
            expStr='Expires '+fmtDate(c.expireDate);expClass='';
        }

        var amountDisplay=isDiscount ? c.amount+'% off' : '$'+c.amount.toFixed(2)+' credit';
        var amountClass=isDiscount?'discount':'cash';
        var typeLabel=isDiscount?'Discount':'Account Credit';

        return '<div class="credit-card'+(isExpired?' expired':'')+'">'+
            '<div class="credit-card-header">'+
                '<div class="credit-header-left">'+
                    '<div class="credit-type-label">'+typeLabel+'</div>'+
                    '<div class="credit-amount '+amountClass+'">'+amountDisplay+'</div>'+
                    (isDiscount?'<div class="credit-amount-sub">Applied automatically at billing</div>':'<div class="credit-amount-sub">Applied as a balance credit</div>')+
                '</div>'+
                '<div class="credit-header-right">'+
                    (expStr?'<div class="credit-expire '+expClass+'">'+expStr+'</div>':'')+
                    (isExpired?'<span class="bdg bdg-cancelled" style="margin-top:6px;display:inline-flex;">Expired</span>':'<span class="bdg bdg-active" style="margin-top:6px;display:inline-flex;">Active</span>')+
                '</div>'+
            '</div>'+
        '</div>';
    }

    var html=summaryHTML+'<div class="credit-list">';
    active.forEach(function(c){html+=renderCard(c,false);});
    if(expired.length){
        html+='<p style="font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:#ccc;margin-top:8px;margin-bottom:4px;">Past</p>';
        expired.forEach(function(c){html+=renderCard(c,true);});
    }
    html+='</div>';
    container.innerHTML=html;
}

auth.onAuthStateChanged(async function(user){
    if(!user){window.location.href='/account/login/';return;}
    document.getElementById('mobileAvatar').textContent=
        user.displayName?user.displayName.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';

    // Load role
    var role='Homeowner';
    try{
        var doc=await db.collection('customers').doc(user.uid).get();
        if(doc.exists&&doc.data().role)role=doc.data().role;
    }catch(e){}

    // Staff shouldn't be on this page
    if(BWD.isStaff(role)){window.location.href='/account/dashboard/appointments/';return;}

    BWD.injectNav('credits',role);

    // Load credits CSV
    try{
        var rows=await cachedCSV('credits',CSV_CREDITS);
        // cols: 0=UID, 1=DATE(staff only), 2=EXPIRE_DATE, 3=TYPE, 4=AMOUNT, 5=NOTES(staff only)
        var myCredits=rows.filter(function(r){return r[0]===user.uid;}).map(function(r){
            return{
                uid:r[0],expireDate:r[2]||'',type:r[3]||'amount',
                amount:parseFloat(r[4])||0
            };
        });
        renderCredits(myCredits);
    }catch(e){
        console.error('Credits load error:',e);
        document.getElementById('pageContent').innerHTML='<p style="color:#d93025;font-size:13px;">Failed to load credits. Please try again later.</p>';
    }
});
</script>

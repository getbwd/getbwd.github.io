<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credits & Deals | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
.credits-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.credit-stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.credit-stat-label{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.credit-stat-value{font-size:22px;font-weight:800;color:var(--text);line-height:1.1;}
.credit-stat.accent .credit-stat-value{color:var(--orange);}

.credits-list{display:flex;flex-direction:column;gap:12px;}
.credit-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.credit-card.expired{opacity:0.55;}
.credit-card-left{flex:1;min-width:0;}
.credit-type-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.credit-type-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.credit-type-icon.amount{background:#fff4ec;color:var(--orange);}
.credit-type-icon.discount{background:#edf7f1;color:#1e8a4a;}
.credit-label{font-size:14px;font-weight:700;color:var(--text);}
.credit-sub{font-size:12px;color:var(--text-3);line-height:1.5;}
.credit-sub span{display:inline-block;}

.credit-card-right{text-align:right;flex-shrink:0;}
.credit-amount-big{font-size:20px;font-weight:800;line-height:1.1;margin-bottom:4px;}
.credit-amount-big.amount{color:var(--orange);}
.credit-amount-big.discount{color:#1e8a4a;}

.bdg-active-credit{background:#edf7f1;color:#1e8a4a;border:1px solid #b6dfc8;}
.bdg-expired-credit{background:#f5f5f3;color:#aaa;border:1px solid #e0ded8;}
.bdg-expiring-credit{background:#fff8ec;color:#b35c00;border:1px solid #ffd59e;}

.empty-credits{text-align:center;padding:40px 20px;}
.empty-credits-icon{font-size:36px;margin-bottom:12px;}
.empty-credits-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty-credits-sub{font-size:13px;color:var(--text-3);}

.section-divider{display:flex;align-items:center;gap:12px;margin:28px 0 16px;}
.section-divider-label{font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;white-space:nowrap;}
.section-divider-line{flex:1;height:1px;background:var(--border-light);}
</style>
</head>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/account/dashboard/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item active" href="/account/dashboard/credits/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.5 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Credits & Deals</a>
            <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>

    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page" style="max-width:720px;">
            <div class="section-header">
                <h1 class="section-title">Credits &amp; Deals</h1>
                <p class="section-sub">Your account credits and available discounts.</p>
            </div>

            <!-- Summary stats -->
            <div class="credits-summary" id="creditsSummary" style="display:none;">
                <div class="credit-stat accent">
                    <div class="credit-stat-label">Account Credit</div>
                    <div class="credit-stat-value" id="statTotalCredit">$0.00</div>
                </div>
                <div class="credit-stat">
                    <div class="credit-stat-label">Active Discounts</div>
                    <div class="credit-stat-value" id="statActiveDiscounts">0</div>
                </div>
                <div class="credit-stat">
                    <div class="credit-stat-label">Total Credits</div>
                    <div class="credit-stat-value" id="statTotalCount">0</div>
                </div>
            </div>

            <div id="creditsContainer"><p style="color:#ccc;font-size:14px;">Loading…</p></div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth=firebase.auth();

document.getElementById('signOutBtn').addEventListener('click',function(){auth.signOut().then(function(){window.location.href='/account/login/';});});
document.getElementById('mobileMenuBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('visible');});
document.getElementById('sidebarOverlay').addEventListener('click',function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('visible');});

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}

function parseCSV(text){
    var rows=[];var lines=text.trim().split('\n');
    for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;
        for(var i=0;i<lines[l].length;i++){var c=lines[l][i];
            if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}
        cols.push(cur.trim());rows.push(cols);}return rows;}

async function cachedCSV(key,url){
    var cacheKey='bwd_csv_'+key;
    var cached=sessionStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached);}catch(e){}}
    var res=await fetch(url);var text=await res.text();
    var rows=parseCSV(text).slice(1);
    try{sessionStorage.setItem(cacheKey,JSON.stringify(rows));}catch(e){}
    return rows;}

var CSV_CREDITS='https://docs.google.com/spreadsheets/d/e/2PACX-1vRPOxUpuo-X0UG1qYHSxfl1ofLBMQXoydcUPbrHkSTeWfjJFr9xqdIp2ekfjIZAPrsbIMQO2rvt8fyd/pub?output=csv';

function isExpired(expireStr){
    if(!expireStr||expireStr.toLowerCase().trim()==='indf')return false;
    var d=new Date(expireStr);
    if(isNaN(d.getTime()))return false;
    d.setHours(23,59,59,999);
    return d<new Date();
}

function isExpiringSoon(expireStr){
    if(!expireStr||expireStr.toLowerCase().trim()==='indf')return false;
    var d=new Date(expireStr);
    if(isNaN(d.getTime()))return false;
    d.setHours(23,59,59,999);
    var now=new Date();
    var diff=(d-now)/(1000*60*60*24);
    return diff>=0&&diff<=14;
}

function fmtExpire(expireStr){
    if(!expireStr||expireStr.toLowerCase().trim()==='indf')return 'Never expires';
    var d=new Date(expireStr);
    if(isNaN(d.getTime()))return expireStr;
    return 'Expires '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function statusBadge(expireStr){
    if(isExpired(expireStr)){
        return '<span class="bdg bdg-expired-credit">Expired</span>';
    }
    if(isExpiringSoon(expireStr)){
        return '<span class="bdg bdg-expiring-credit">Expiring soon</span>';
    }
    return '<span class="bdg bdg-active-credit">Active</span>';
}

auth.onAuthStateChanged(async function(user){
    if(!user){window.location.href='/account/login/';return;}
    document.getElementById('mobileAvatar').textContent=initials(user.displayName||'');
    var uid=user.uid;

    var rows=await cachedCSV('credits',CSV_CREDITS);
    // cols: 0=UID, 1=DATE, 2=EXPIRE_DATE, 3=TYPE, 4=AMOUNT
    var myCredits=rows.filter(function(r){return r[0]===uid;});

    var container=document.getElementById('creditsContainer');

    if(!myCredits.length){
        container.innerHTML=
            '<div class="card"><div class="card-body">'+
            '<div class="empty-credits">'+
            '<div class="empty-credits-icon">🎁</div>'+
            '<div class="empty-credits-title">No credits or deals yet</div>'+
            '<div class="empty-credits-sub">When we apply a credit or deal to your account, it\'ll show up here.</div>'+
            '</div></div></div>';
        return;
    }

    // Compute summary
    var activeCredits=myCredits.filter(function(r){return !isExpired(r[2])&&(r[3]||'').toLowerCase()==='amount';});
    var activeDiscounts=myCredits.filter(function(r){return !isExpired(r[2])&&(r[3]||'').toLowerCase()==='discount';});
    var totalCreditAmt=activeCredits.reduce(function(s,r){return s+parseFloat(r[4]||0);},0);

    document.getElementById('statTotalCredit').textContent=fmtMoney(totalCreditAmt);
    document.getElementById('statActiveDiscounts').textContent=activeDiscounts.length;
    document.getElementById('statTotalCount').textContent=myCredits.length;
    document.getElementById('creditsSummary').style.display='grid';

    // Sort: active first, then expiring soon, then expired; within active sort by expiry asc
    var active=myCredits.filter(function(r){return !isExpired(r[2]);});
    var expired=myCredits.filter(function(r){return isExpired(r[2]);});

    active.sort(function(a,b){
        var aIndf=!a[2]||a[2].toLowerCase().trim()==='indf';
        var bIndf=!b[2]||b[2].toLowerCase().trim()==='indf';
        if(aIndf&&bIndf)return 0;
        if(aIndf)return 1;
        if(bIndf)return -1;
        return new Date(a[2])-new Date(b[2]);
    });

    expired.sort(function(a,b){return new Date(b[2])-new Date(a[2]);});

    function renderCard(r){
        var type=(r[3]||'').toLowerCase().trim();
        var amount=parseFloat(r[4]||0);
        var expired=isExpired(r[2]);
        var isDiscount=type==='discount';
        var isAmount=type==='amount';

        var displayValue=isDiscount
            ? amount+'% off'
            : fmtMoney(amount);

        var label=isDiscount
            ? amount+'% Discount'
            : fmtMoney(amount)+' Account Credit';

        var icon=isDiscount?'%':'$';
        var iconClass=isDiscount?'discount':'amount';
        var amtClass=isDiscount?'discount':'amount';

        var expireStr=fmtExpire(r[2]);

        return '<div class="credit-card'+(expired?' expired':'')+'">' +
            '<div class="credit-card-left">' +
                '<div class="credit-type-row">' +
                    '<div class="credit-type-icon '+iconClass+'">'+icon+'</div>' +
                    '<span class="credit-label">'+label+'</span>' +
                '</div>' +
                '<div class="credit-sub">' +
                    '<span>'+expireStr+'</span>' +
                '</div>' +
            '</div>' +
            '<div class="credit-card-right">' +
                '<div class="credit-amount-big '+amtClass+'">'+displayValue+'</div>' +
                statusBadge(r[2]) +
            '</div>' +
        '</div>';
    }

    var html='<div class="credits-list">';

    if(active.length){
        html+=active.map(renderCard).join('');
    }

    if(expired.length){
        html+='<div class="section-divider"><span class="section-divider-label">Expired</span><span class="section-divider-line"></span></div>';
        html+=expired.map(renderCard).join('');
    }

    html+='</div>';
    container.innerHTML=html;
});
</script>
</body>
</html>

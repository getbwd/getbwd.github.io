function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function badge(status){
    var s=(status||'').toLowerCase().trim();
    var map={
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function parseCSV(text){var rows=[];var lines=text.trim().split('\n');for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;for(var i=0;i<lines[l].length;i++){var c=lines[l][i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());rows.push(cols);}return rows;}
function parsePipe(str){return str?str.split('|').map(function(s){return s.trim();}).filter(Boolean):[];}
function parseLineItems(str){return parsePipe(str).map(function(seg){var p=seg.split(',').map(function(s){return s.trim();});var qty=parseFloat(p[1])||1;var unit=parseFloat(p[2])||0;return{name:p[0]||'—',qty:qty,unitPrice:unit,lineTotal:qty*unit};});}

var CSV_JOBS='https://docs.google.com/spreadsheets/d/e/2PACX-1vSHSfVRR2EnvXGH5nZBOesVJdoTl2p3bHun-oFYYSZrg7fEvGXyIDxPkycWTtCjWstt8ccFgpa8wlkg/pub?gid=0&single=true&output=csv';

async function cachedCSV(key,url){
    var cacheKey='bwd_csv_'+key;var cached=sessionStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached);}catch(e){}}
    var res=await fetch(url);var text=await res.text();
    var rows=parseCSV(text).slice(1);
    try{sessionStorage.setItem(cacheKey,JSON.stringify(rows));}catch(e){}
    return rows;}

function toggleCard(jobId){
    var body=document.getElementById('body-'+jobId);
    var card=document.getElementById('card-'+jobId);
    if(!body)return;
    var isOpen=!body.classList.contains('collapsed');
    body.classList.toggle('collapsed');
    card.classList.toggle('open',isOpen);
    if(!isOpen){history.replaceState(null,null,'#'+jobId);}
    else if(window.location.hash==='#'+jobId){history.replaceState(null,null,' ');}
}

auth.onAuthStateChanged(async function(user){
    if(!user){window.location.href='/account/login/';return;}
    document.getElementById('mobileAvatar').textContent=initials(user.displayName||'');
    var uid=user.uid;

    var jobRows=await cachedCSV('jobs',CSV_JOBS);
    var myJobs=jobRows.filter(function(r){return r[1]===uid;}).sort(function(a,b){return new Date(b[3])-new Date(a[3]);});
    var container=document.getElementById('jobListContainer');

    if(!myJobs.length){container.innerHTML='<div class="card"><div class="card-body">'+empty('No appointments on your account yet.')+'</div></div>';return;}

    var targetHash=window.location.hash.replace('#','');

        var jobId    = (r[0]||'').trim();
        var status   = r[2]||'Scheduled';
        var rawDate  = r[3]||'';
        var time     = r[4]||'';
        var address  = r[5]||'';
        var items    = parseLineItems(r[6]);
        var invoiceId= r[7]||'';
        var assigned = r[8]||'';
        var custNote = r[9]||'';
        var crewNote = r[10]||'';
        var total    = items.reduce(function(s,i){return s+i.lineTotal;},0);
        var isScheduled= (r[2]||'').toLowerCase()==='scheduled';
        var isTarget = jobId===targetHash;

        var dateStr='—';
        if(rawDate){try{dateStr=new Date(rawDate).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}catch(e){dateStr=rawDate;}}

        var svcNames=items.map(function(i){return i.name;}).join(', ')||'Service Visit';

        var metaParts=[];
        if(rawDate)metaParts.push('<span>📅 '+dateStr+(time?' · '+time:'')+'</span>');

        // Line items table
        var lineItemsHTML='';
        if(items.length){
            lineItemsHTML='<div><table class="line-items"><tr><th>Service</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>'+
                items.map(function(i){return '<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fmtMoney(i.unitPrice)+'</td><td>'+fmtMoney(i.lineTotal)+'</td></tr>';}).join('')+
                '<tr class="total-row"><td colspan="3">Job Total</td><td>'+fmtMoney(total)+'</td></tr></table></div>';}

        // Detail grid
        var detailItems=[];
        if(address)detailItems.push('<div class="detail-item"><div class="detail-item-label">Address</div><div class="detail-item-value">'+address+'</div></div>');
        if(assigned)detailItems.push('<div class="detail-item"><div class="detail-item-label">Assigned Crew</div><div class="detail-item-value">'+assigned+'</div></div>');
        if(invoiceId)detailItems.push('<div class="detail-item"><div class="detail-item-label">Invoice</div><div class="detail-item-value"><a href="/account/dashboard/invoices/#'+invoiceId+'" style="color:var(--orange);">#'+invoiceId+'</a></div></div>');
        var detailGridHTML=detailItems.length?'<div class="detail-grid">'+detailItems.join('')+'</div>':'';

        // Customer notes
        var savedNoteData=null;try{savedNoteData=JSON.parse(localStorage.getItem('bwd_cnote_'+jobId));}catch(e){}
        var displayNote=savedNoteData&&savedNoteData.note!==undefined?savedNoteData.note:custNote;

        var notesHTML='';
        if(isScheduled){
            notesHTML+='<div><div class="detail-section-label">Your Notes</div>'+
                '<textarea class="feedback-input" id="cnote-'+jobId+'" placeholder="Add a note for your crew (gate code, special instructions, etc.)…" style="min-height:80px;">'+displayNote+'</textarea>'+

```
            '<div style="margin-top:6px;display:flex;align-items:center;gap:10px;">'+
            '<button class="btn-rate" id="cnote-btn-'+jobId+'">Save Note</button>'+
            '<span id="cnote-conf-'+jobId+'" style="font-size:12px;color:var(--text-3);display:none;"></span>'+
            '</div></div>';
    } else {

    // Rating

                '</div></div>';
        } else {
            ratingHTML='<div class="rating-section"><div class="detail-section-label">Rate this visit</div>'+
                '<div class="stars" id="stars-'+jobId+'" data-saved="0"></div>'+
                '<textarea class="feedback-input" id="fb-'+jobId+'" placeholder="Leave feedback (optional)…"></textarea>'+

    html+='<div class="job-card-title">'+svcNames+' <span class="job-card-id">· Job #'+jobId+'</span></div>';
    html+='<div class="job-card-meta">'+metaParts.join('')+'</div>';
    html+='</div>';
    html+='<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">'+badge(status)+'<span class="toggle-chevron">▾</span></div>';
    html+='</div>';
    html+='<div class="'+bodyClass+'" id="body-'+jobId+'">';
    html+=detailGridHTML+lineItemsHTML+notesHTML+ratingHTML;
    html+='</div></div>';
});

html+='</div>';
container.innerHTML=html;

// Wire customer note save for Scheduled jobs
myJobs.forEach(function(r){
    var jobId=(r[0]||'').trim();
    var isScheduled=(r[2]||'').toLowerCase()==='scheduled';
    if(!isScheduled)return;
    var noteBtn=document.getElementById('cnote-btn-'+jobId);
    var noteInput=document.getElementById('cnote-'+jobId);
    var noteConf=document.getElementById('cnote-conf-'+jobId);
    if(!noteBtn||!noteInput)return;
    noteBtn.addEventListener('click',function(){
        var val=noteInput.value;
        try{localStorage.setItem('bwd_cnote_'+jobId,JSON.stringify({note:val}));}catch(e){}
        noteConf.textContent='Note saved!';
        noteConf.style.color='#1e8a4a';
        noteConf.style.display='inline';
        setTimeout(function(){
            noteConf.textContent='Changes are visible to your crew.';
            noteConf.style.color='var(--text-3)';
        },2000);
    });
});

// Wire stars and feedback for all non-scheduled jobs
myJobs.forEach(function(r){
    var jobId=(r[0]||'').trim();
    var isScheduled=(r[2]||'').toLowerCase()==='scheduled';
    if(isScheduled)return;

    var starsEl=document.getElementById('stars-'+jobId);
    var btn=document.getElementById('btn-'+jobId);
    var fbEl=document.getElementById('fb-'+jobId);
    var thankEl=document.getElementById('thank-'+jobId);
    if(!starsEl)return;

    var saved=null;try{saved=JSON.parse(localStorage.getItem('bwd_review_'+jobId));}catch(e){}
    var initRating=saved&&saved.rating?parseInt(saved.rating):0;
    var currentRating=initRating;

    function drawStars(){
        starsEl.innerHTML='';
        for(var i=1;i<=5;i++){
            (function(i){
                var s=document.createElement('span');
                s.className='star'+(i<=currentRating?' filled':'');
                s.textContent='★';
                s.addEventListener('mouseover',function(){starsEl.querySelectorAll('.star').forEach(function(el,idx){el.classList.toggle('filled',idx<i);});});
                s.addEventListener('mouseout',drawStars);
                s.addEventListener('click',function(){currentRating=i;drawStars();});
                starsEl.appendChild(s);
            })(i);
        }
    }
    drawStars();

    if(btn){
        btn.addEventListener('click',function(){
            var fbText=fbEl?fbEl.value:'';
            try{localStorage.setItem('bwd_review_'+jobId,JSON.stringify({rating:currentRating,feedback:fbText}));}catch(e){}
            btn.textContent='Update Review';
            if(thankEl){thankEl.style.display='none';}
            var conf=document.getElementById('conf-'+jobId);
            if(!conf){
                conf=document.createElement('span');
                conf.id='conf-'+jobId;
                conf.style.cssText='font-size:12px;color:#1e8a4a;font-weight:500;margin-left:10px;';
                btn.parentNode.appendChild(conf);
            }
            conf.textContent='Review saved!';
            setTimeout(function(){conf.textContent='You can edit and update it anytime.';conf.style.color='var(--text-3)';},2000);
        });
    }
});

// Scroll to target
if(targetHash){

    if(el)setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

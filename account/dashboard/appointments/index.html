<style>
.job-list{display:flex;flex-direction:column;gap:14px;}
.job-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:24px;}
.job-card.highlight{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.job-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px 14px;cursor:pointer;user-select:none;}
.job-card-header:hover{background:#fafaf8;}
.job-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.job-card-id{font-size:11px;font-weight:400;color:var(--text-3);}
.job-card-meta{font-size:12px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
.job-card-meta span{display:inline-flex;align-items:center;gap:4px;}
.job-card-body{padding:18px 20px;border-top:1px solid var(--border-light);display:flex;flex-direction:column;gap:16px;}
.job-card-body.collapsed{display:none;}
.detail-section-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.line-items{width:100%;border-collapse:collapse;font-size:13px;}
.line-items th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;padding:0 8px 6px 0;}
.line-items th:last-child,.line-items td:last-child{text-align:right;}
.line-items td{padding:6px 8px 6px 0;color:var(--text-2);border-top:1px solid var(--border-light);font-size:13px;}
.line-items .total-row td{font-weight:700;color:var(--text);border-top:2px solid var(--border);padding-top:8px;}
.note-block{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text-3);line-height:1.6;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-item{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;}
.detail-item-label{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.detail-item-value{font-size:13px;color:var(--text-2);line-height:1.4;}
.rating-section{display:flex;flex-direction:column;gap:8px;}
.stars{display:flex;gap:4px;cursor:pointer;}
.star{font-size:24px;color:#ddd;transition:color 0.1s;user-select:none;}
.star.filled{color:#f5a623;}
.feedback-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);resize:vertical;min-height:70px;background:var(--white);}
.feedback-input:focus{outline:none;border-color:var(--orange);}
.btn-rate{margin-top:4px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;background:var(--orange);color:#fff;border:none;cursor:pointer;}
.btn-rate:hover{background:var(--orange-dark);}
.rate-thanks{font-size:13px;color:#1e8a4a;font-weight:500;margin-left:10px;}
.toggle-chevron{font-size:18px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;line-height:1;}
.job-card.open .toggle-chevron{transform:rotate(180deg);}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){
    auth.signOut().then(function(){ window.location.href = '/account/login/'; });
});
document.getElementById('mobileMenuBtn').addEventListener('click', function(){
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('visible');
});
document.getElementById('sidebarOverlay').addEventListener('click', function(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
});

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s = (status||'').toLowerCase().trim();
    var map = {
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused',
        'canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){ return '<p class="empty-state">'+msg+'</p>'; }

function toggleCard(jobId){
    var body = document.getElementById('body-'+jobId);
    var card = document.getElementById('card-'+jobId);
    if(!body) return;
    var isOpen = !body.classList.contains('collapsed');
    body.classList.toggle('collapsed');
    card.classList.toggle('open', isOpen);
    if(!isOpen){ history.replaceState(null, null, '#'+jobId); }
    else if(window.location.hash === '#'+jobId){ history.replaceState(null, null, ' '); }
}

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href = '/account/login/'; return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');

    var container = document.getElementById('jobListContainer');
    var targetHash = window.location.hash.replace('#','');

    var snapshot;
    try {
        snapshot = await db.collection('jobs')
            .where('uid', '==', user.uid)
            .orderBy('date', 'desc')
            .get();
    } catch(e) {
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('Failed to load appointments.')+'</div></div>';
        console.error(e);
        return;
    }

    if(snapshot.empty){
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('No appointments on your account yet.')+'</div></div>';
        return;
    }

    // Normalize each Firestore doc into a plain job object
    var jobs = [];
    snapshot.forEach(function(doc){
        var d = doc.data();
        jobs.push({
            jobId:         doc.id,
            status:        d.status || 'Scheduled',
            date:          d.date ? d.date.toDate() : null,   // Firestore Timestamp → JS Date
            time:          d.time || '',
            address:       d.address || '',
            services:      Array.isArray(d.services) ? d.services : [],  // [{name, qty, unitPrice}]
            invoiceId:     d.invoiceId || '',
            assignedCrew:  d.assignedCrew || '',
            customerNotes: d.customerNotes || '',
            crewNotes:     d.crewNotes || '',
            rating:        d.rating || 0,
            feedback:      d.feedback || '',
        });
    });

    var html = '<div class="job-list">';

    jobs.forEach(function(job){
        var jobId      = job.jobId;
        var status     = job.status;
        var isScheduled = status.toLowerCase() === 'scheduled';
        var isTarget   = jobId === targetHash;

        // Format date
        var dateStr = '—';
        if(job.date){
            try{ dateStr = job.date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
            catch(e){ dateStr = job.date.toString(); }
        }

        // Services / line items
        var items = job.services.map(function(s){
            var qty  = Number(s.qty)       || 1;
            var unit = Number(s.unitPrice) || 0;
            return { name: s.name||'—', qty: qty, unitPrice: unit, lineTotal: qty*unit };
        });
        var total    = items.reduce(function(s,i){ return s+i.lineTotal; }, 0);
        var svcNames = items.map(function(i){ return i.name; }).join(', ') || 'Service Visit';

        // Meta row
        var metaParts = [];
        if(job.date) metaParts.push('<span>📅 '+dateStr+(job.time?' · '+job.time:'')+'</span>');

        // Line items table
        var lineItemsHTML = '';
        if(items.length){
            lineItemsHTML = '<div><table class="line-items">'+
                '<tr><th>Service</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>'+
                items.map(function(i){
                    return '<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fmtMoney(i.unitPrice)+'</td><td>'+fmtMoney(i.lineTotal)+'</td></tr>';
                }).join('')+
                '<tr class="total-row"><td colspan="3">Job Total</td><td>'+fmtMoney(total)+'</td></tr>'+
                '</table></div>';
        }

        // Detail grid
        var detailItems = [];
        if(job.address)     detailItems.push('<div class="detail-item"><div class="detail-item-label">Address</div><div class="detail-item-value">'+job.address+'</div></div>');
        if(job.assignedCrew)detailItems.push('<div class="detail-item"><div class="detail-item-label">Assigned Crew</div><div class="detail-item-value">'+job.assignedCrew+'</div></div>');
        if(job.invoiceId)   detailItems.push('<div class="detail-item"><div class="detail-item-label">Invoice</div><div class="detail-item-value"><a href="/account/dashboard/invoices/#'+job.invoiceId+'" style="color:var(--orange);">#'+job.invoiceId+'</a></div></div>');
        var detailGridHTML = detailItems.length ? '<div class="detail-grid">'+detailItems.join('')+'</div>' : '';

        // Customer notes — editable if Scheduled, read-only otherwise
        // Check localStorage for any locally saved note (overrides Firestore value for display)
        var savedNoteData = null;
        try{ savedNoteData = JSON.parse(localStorage.getItem('bwd_cnote_'+jobId)); }catch(e){}
        var displayNote = (savedNoteData && savedNoteData.note !== undefined) ? savedNoteData.note : job.customerNotes;

        var notesHTML = '';
        if(isScheduled){
            notesHTML += '<div><div class="detail-section-label">Your Notes</div>'+
                '<textarea class="feedback-input" id="cnote-'+jobId+'" placeholder="Add a note for your crew (gate code, special instructions, etc.)…" style="min-height:80px;">'+displayNote+'</textarea>'+
            '<div style="margin-top:6px;display:flex;align-items:center;gap:10px;">'+
            '<button class="btn-rate" id="cnote-btn-'+jobId+'">Save Note</button>'+
            '<span id="cnote-conf-'+jobId+'" style="font-size:12px;color:var(--text-3);display:none;"></span>'+
            '</div></div>';
    } else {
        if(displayNote) notesHTML += '<div><div class="detail-section-label">Your Notes</div><div class="note-block">'+displayNote+'</div></div>';
    }
    if(job.crewNotes) notesHTML += '<div><div class="detail-section-label">Crew Notes</div><div class="note-block">'+job.crewNotes+'</div></div>';

    // Rating — only show if not Scheduled
    var savedReview = null;
    try{ savedReview = JSON.parse(localStorage.getItem('bwd_review_'+jobId)); }catch(e){}
    var hasReview = savedReview && (savedReview.rating || savedReview.feedback);
    var ratingHTML = '';
    if(!isScheduled){
        var savedFb     = hasReview ? savedReview.feedback : '';
        var savedRating = hasReview ? savedReview.rating   : 0;
        if(hasReview){
            ratingHTML = '<div class="rating-section"><div class="detail-section-label">Your Review</div>'+
                '<div class="stars" id="stars-'+jobId+'" data-saved="'+savedRating+'"></div>'+
                '<textarea class="feedback-input" id="fb-'+jobId+'" placeholder="Leave feedback (optional)…">'+savedFb+'</textarea>'+
                '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'+
                '<button class="btn-rate" id="btn-'+jobId+'">Update Review</button>'+
                '<span style="font-size:12px;color:var(--text-3);">You submitted a review — you can edit and update it anytime.</span>'+
                '</div></div>';
        } else {
            ratingHTML = '<div class="rating-section"><div class="detail-section-label">Rate this visit</div>'+
                '<div class="stars" id="stars-'+jobId+'" data-saved="0"></div>'+
                '<textarea class="feedback-input" id="fb-'+jobId+'" placeholder="Leave feedback (optional)…"></textarea>'+
                '<div><button class="btn-rate" id="btn-'+jobId+'">Submit</button>'+
                '<span class="rate-thanks" id="thank-'+jobId+'" style="display:none;">Thanks for your feedback!</span>'+
                '</div></div>';
        }
    }

    var bodyClass = 'job-card-body' + (isTarget ? '' : ' collapsed');

    html += '<div class="job-card'+(isTarget?' highlight':'')+'" id="card-'+jobId+'">';
    html += '<div class="job-card-header" onclick="toggleCard(\''+jobId+'\')">';
    html += '<div style="min-width:0;flex:1;">';
    html += '<div class="job-card-title">'+svcNames+' <span class="job-card-id">· Job #'+jobId+'</span></div>';
    html += '<div class="job-card-meta">'+metaParts.join('')+'</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">'+badge(status)+'<span class="toggle-chevron">▾</span></div>';
    html += '</div>';
    html += '<div class="'+bodyClass+'" id="body-'+jobId+'">';
    html += detailGridHTML + lineItemsHTML + notesHTML + ratingHTML;
    html += '</div></div>';
});

html += '</div>';
container.innerHTML = html;

// Wire customer note save for Scheduled jobs
jobs.forEach(function(job){
    if(job.status.toLowerCase() !== 'scheduled') return;
    var jobId   = job.jobId;
    var noteBtn = document.getElementById('cnote-btn-'+jobId);
    var noteInput = document.getElementById('cnote-'+jobId);
    var noteConf  = document.getElementById('cnote-conf-'+jobId);
    if(!noteBtn || !noteInput) return;
    noteBtn.addEventListener('click', function(){
        var val = noteInput.value;
        try{ localStorage.setItem('bwd_cnote_'+jobId, JSON.stringify({note:val})); }catch(e){}
        noteConf.textContent = 'Note saved!';
        noteConf.style.color = '#1e8a4a';
        noteConf.style.display = 'inline';
        setTimeout(function(){
            noteConf.textContent = 'Changes are visible to your crew.';
            noteConf.style.color = 'var(--text-3)';
        }, 2000);
    });
});

// Wire stars and feedback for non-Scheduled jobs
jobs.forEach(function(job){
    if(job.status.toLowerCase() === 'scheduled') return;
    var jobId  = job.jobId;
    var starsEl = document.getElementById('stars-'+jobId);
    var btn     = document.getElementById('btn-'+jobId);
    var fbEl    = document.getElementById('fb-'+jobId);
    var thankEl = document.getElementById('thank-'+jobId);
    if(!starsEl) return;

    var saved = null;
    try{ saved = JSON.parse(localStorage.getItem('bwd_review_'+jobId)); }catch(e){}
    var currentRating = (saved && saved.rating) ? parseInt(saved.rating) : 0;

    function drawStars(){
        starsEl.innerHTML = '';
        for(var i=1; i<=5; i++){
            (function(i){
                var s = document.createElement('span');
                s.className = 'star' + (i <= currentRating ? ' filled' : '');
                s.textContent = '★';
                s.addEventListener('mouseover', function(){
                    starsEl.querySelectorAll('.star').forEach(function(el,idx){ el.classList.toggle('filled', idx<i); });
                });
                s.addEventListener('mouseout', drawStars);
                s.addEventListener('click', function(){ currentRating = i; drawStars(); });
                starsEl.appendChild(s);
            })(i);
        }
    }
    drawStars();

    if(btn){
        btn.addEventListener('click', function(){
            var fbText = fbEl ? fbEl.value : '';
            try{ localStorage.setItem('bwd_review_'+jobId, JSON.stringify({rating:currentRating, feedback:fbText})); }catch(e){}
            btn.textContent = 'Update Review';
            if(thankEl) thankEl.style.display = 'none';
            var conf = document.getElementById('conf-'+jobId);
            if(!conf){
                conf = document.createElement('span');
                conf.id = 'conf-'+jobId;
                conf.style.cssText = 'font-size:12px;color:#1e8a4a;font-weight:500;margin-left:10px;';
                btn.parentNode.appendChild(conf);
            }
            conf.textContent = 'Review saved!';
            setTimeout(function(){ conf.textContent = 'You can edit and update it anytime.'; conf.style.color = 'var(--text-3)'; }, 2000);
        });
    }
});

// Scroll to target
if(targetHash){
    var el = document.getElementById('card-'+targetHash);
    if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointments | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="dashboard.css">
<style>
.loading-text{color:#ccc;font-size:14px;}

/* Job detail cards */
.job-list { display: flex; flex-direction: column; gap: 14px; }
.job-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.job-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 16px 20px 12px; border-bottom: 1px solid var(--border-light); }
.job-card-title  { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.job-card-meta   { font-size: 12px; color: var(--text-3); display: flex; flex-wrap: wrap; gap: 10px; }
.job-card-meta span { display: flex; align-items: center; gap: 4px; }
.job-card-body   { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }

/* Line items table inside job card */
.line-items { width: 100%; border-collapse: collapse; font-size: 13px; }
.line-items th { text-align: left; font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #bbb; padding: 0 0 6px; }
.line-items td { padding: 5px 0; color: var(--text-2); border-top: 1px solid var(--border-light); }
.line-items td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.line-items .total-row td { font-weight: 700; color: var(--text); border-top: 1px solid var(--border); padding-top: 8px; }

/* Notes section */
.note-block { background: #fafaf8; border: 1px solid var(--border-light); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--text-3); line-height: 1.5; }
.note-label  { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: #bbb; margin-bottom: 3px; }

/* Star rating */
.rating-section { display: flex; flex-direction: column; gap: 6px; }
.stars { display: flex; gap: 4px; cursor: pointer; }
.star { font-size: 22px; color: #ddd; transition: color 0.1s; user-select: none; }
.star.filled { color: #f5a623; }
.feedback-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--text); resize: vertical; min-height: 70px; background: var(--white); }
.feedback-input:focus { outline: none; border-color: var(--orange); }
.btn-rate { margin-top: 4px; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; background: var(--orange); color: #fff; border: none; cursor: pointer; transition: background 0.15s; }
.btn-rate:hover { background: var(--orange-dark); }
.rate-thanks { font-size: 13px; color: #1e8a4a; font-weight: 500; }

/* Collapsible toggle */
.job-toggle { font-size: 12px; font-weight: 600; color: var(--orange); background: none; border: none; cursor: pointer; padding: 0; font-family: 'Inter', sans-serif; white-space: nowrap; }
.job-card-body.collapsed { display: none; }

@media(max-width:600px){ .job-card-meta { flex-direction: column; gap: 4px; } }
</style>
</head>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="index.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item active" href="appointments.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item" href="invoices.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item" href="services.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="account.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>
    </aside>
    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">Appointments</h1>
                <p class="section-sub">Your upcoming and past service visits.</p>
            </div>
            <div id="jobListContainer"><p class="loading-text">Loading…</p></div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="dashboard.js"></script>
<script>
initFirebase();
const auth = firebase.auth();
initSidebar();
initSignOut(auth, 'signOutBtn');

function renderStars(containerId, initial) {
    const container = document.getElementById(containerId);
    if (!container) return;
    let current = parseInt(initial) || 0;
    function draw() {
        container.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const s = document.createElement('span');
            s.className = 'star' + (i <= current ? ' filled' : '');
            s.textContent = '★';
            s.addEventListener('mouseover', () => {
                container.querySelectorAll('.star').forEach((el,idx) => el.classList.toggle('filled', idx < i));
            });
            s.addEventListener('mouseout', draw);
            s.addEventListener('click', () => { current = i; draw(); });
            container.appendChild(s);
        }
    }
    draw();
}

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/account/login/'); return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');
    const uid = user.uid;

    const jobRows = await fetchCSV(CSV.JOBS);
    const myJobs  = jobRows.filter(r => r[1] === uid)
                           .sort((a,b) => new Date(b[3]) - new Date(a[3]));

    const container = document.getElementById('jobListContainer');
    if (!myJobs.length) { container.innerHTML = `<div class="card"><div class="card-body">${empty('No appointments on your account yet.')}</div></div>`; return; }

    const isCompleted = r => (r[2]||'').toLowerCase() === 'completed';

    container.innerHTML = `<div class="job-list">${myJobs.map((r, idx) => {
        const jobId    = r[0] || '—';
        const status   = r[2] || 'Scheduled';
        const date     = r[3] ? new Date(r[3]).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}) : '—';
        const time     = r[4] || '';
        const address  = r[5] || '';
        const items    = parseLineItems(r[6]);
        const invoiceId= r[7] || '';
        const assigned = r[8] || '';
        const custNote = r[9] || '';
        const crewNote = r[10] || '';
        const rating   = r[11] || '';
        const feedback = r[12] || '';
        const total    = items.reduce((s,i)=>s+i.lineTotal,0);
        const completed = isCompleted(r);
        const starsId  = `stars-${idx}`;
        const fbId     = `fb-${idx}`;
        const btnId    = `btn-${idx}`;
        const thankId  = `thank-${idx}`;

        const lineItemsHTML = items.length ? `
            <table class="line-items">
                <tr><th>Service</th><th>Qty</th><th style="text-align:right">Total</th></tr>
                ${items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>${fmtMoney(i.lineTotal)}</td></tr>`).join('')}
                <tr class="total-row"><td colspan="2">Total</td><td>${fmtMoney(total)}</td></tr>
            </table>` : '';

        const notesHTML = [
            custNote ? `<div><div class="note-label">Your Notes</div><div class="note-block">${custNote}</div></div>` : '',
            crewNote ? `<div><div class="note-label">Crew Notes</div><div class="note-block">${crewNote}</div></div>` : '',
        ].join('');

        const ratingHTML = completed ? `
            <div class="rating-section">
                <div class="note-label">Rate this visit</div>
                <div class="stars" id="${starsId}"></div>
                <textarea class="feedback-input" id="${fbId}" placeholder="Leave feedback (optional)…">${feedback}</textarea>
                <div>
                    <button class="btn-rate" id="${btnId}">Submit</button>
                    <span class="rate-thanks" id="${thankId}" style="display:none;margin-left:10px;">Thanks for your feedback!</span>
                </div>
            </div>` : '';

        const metaParts = [
            date ? `<span>📅 ${date}</span>` : '',
            time ? `<span>🕐 ${time}</span>` : '',
            address ? `<span>📍 ${address}</span>` : '',
            assigned ? `<span>👷 ${assigned}</span>` : '',
            invoiceId ? `<span>🧾 Invoice #${invoiceId}</span>` : '',
        ].filter(Boolean).join('');

        return `
        <div class="job-card">
            <div class="job-card-header">
                <div>
                    <div class="job-card-title">${items.map(i=>i.name).join(', ') || 'Service Visit'} <span style="font-weight:400;color:var(--text-3);font-size:12px;">· Job #${jobId}</span></div>
                    <div class="job-card-meta">${metaParts}</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                    ${badge(status)}
                    <button class="job-toggle" onclick="toggleJob(${idx})">Details</button>
                </div>
            </div>
            <div class="job-card-body collapsed" id="job-body-${idx}">
                ${lineItemsHTML}
                ${notesHTML}
                ${ratingHTML}
            </div>
        </div>`;
    }).join('')}</div>`;

    // Wire up stars
    myJobs.forEach((r, idx) => {
        if ((r[2]||'').toLowerCase() === 'completed') {
            renderStars(`stars-${idx}`, r[11]);
            const btn   = document.getElementById(`btn-${idx}`);
            const thank = document.getElementById(`thank-${idx}`);
            if (btn) btn.addEventListener('click', () => {
                btn.style.display = 'none';
                thank.style.display = 'inline';
            });
        }
    });
});

function toggleJob(idx) {
    const body = document.getElementById(`job-body-${idx}`);
    const btn  = body.closest('.job-card').querySelector('.job-toggle');
    const open = body.classList.toggle('collapsed');
    btn.textContent = open ? 'Details' : 'Hide';
}
</script>
</body>
</html>

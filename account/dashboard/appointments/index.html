<style>
.job-list{display:flex;flex-direction:column;gap:14px;}
.job-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:24px;}
.job-card.highlight{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.job-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px 14px;cursor:pointer;user-select:none;}
.job-card-header:hover{background:#fafaf8;}
.job-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.job-card-id{font-size:11px;font-weight:400;color:var(--text-3);}
.job-card-meta{font-size:12px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
.job-card-body{padding:18px 20px;border-top:1px solid var(--border-light);display:flex;flex-direction:column;gap:16px;}
.job-card-body.collapsed{display:none;}
.detail-section-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.line-items{width:100%;border-collapse:collapse;font-size:13px;}
.line-items th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;padding:0 8px 6px 0;}
.line-items th:last-child,.line-items td:last-child{text-align:right;}
.line-items td{padding:6px 8px 6px 0;color:var(--text-2);border-top:1px solid var(--border-light);font-size:13px;}
.line-items .total-row td{font-weight:700;color:var(--text);border-top:2px solid var(--border);padding-top:8px;}
.note-block{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text-3);line-height:1.6;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-item{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;}
.detail-item-label{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.detail-item-value{font-size:13px;color:var(--text-2);line-height:1.4;}
.rating-section{display:flex;flex-direction:column;gap:8px;}
.stars{display:flex;gap:4px;cursor:pointer;}
.star{font-size:24px;color:#ddd;transition:color 0.1s;user-select:none;}
.star.filled{color:#f5a623;}
.feedback-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);resize:vertical;min-height:70px;background:var(--white);box-sizing:border-box;}
.feedback-input:focus{outline:none;border-color:var(--orange);}
.btn-rate{margin-top:4px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;background:var(--orange);color:#fff;border:none;cursor:pointer;}
.btn-rate:hover{background:var(--orange-dark);}
.btn-rate:disabled{background:#ccc;cursor:default;}
.toggle-chevron{font-size:18px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;line-height:1;}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
</style>
</head>

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function badge(status){
  var s=(status||'').toLowerCase().trim();
  var map={
    'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled',
    'cancelled':'bdg-cancelled','completed':'bdg-completed','draft':'bdg-default',
    'payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
    'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled'
  };
  return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function jobDate(j){return j.date&&j.date.toDate?j.date.toDate():new Date(j.date||0);}

function toggleCard(jobId){
  var body=document.getElementById('body-'+jobId);
  var card=document.getElementById('card-'+jobId);
  var chev=document.getElementById('chev-'+jobId);
  if(!body)return;
  var nowOpen=body.classList.toggle('collapsed');
  chev.style.transform=nowOpen?'':'rotate(180deg)';
  if(!nowOpen){history.replaceState(null,null,'#'+jobId);}
  else if(window.location.hash==='#'+jobId){history.replaceState(null,null,' ');}
}

    var isTarget=jobId===targetHash;

    var dateStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

var isScheduled=(job.status||’’).toLowerCase()===‘scheduled’;

// Customer note save
if(isScheduled){
  var noteBtn=document.getElementById('cnote-btn-'+jobId);
  var noteConf=document.getElementById('cnote-conf-'+jobId);
  if(noteBtn){
    noteBtn.addEventListener('click',function(){

// Stars & rating
if((job.status||'').toLowerCase()!=='scheduled'){
  var starsEl=document.getElementById('stars-'+jobId);
  var btn=document.getElementById('btn-'+jobId);
  var fbEl=document.getElementById('fb-'+jobId);
  if(!starsEl)return;
  var currentRating=job.rating||0;

  function drawStars(el,rating){
    el.innerHTML='';
    for(var i=1;i<=5;i++){
      (function(i){
        var s=document.createElement('span');
        s.className='star'+(i<=rating?' filled':'');
        s.textContent='★';
        s.addEventListener('mouseover',function(){
          el.querySelectorAll('.star').forEach(function(x,idx){x.classList.toggle('filled',idx<i);});
        });
        s.addEventListener('mouseout',function(){drawStars(el,currentRating);});
        s.addEventListener('click',function(){currentRating=i;drawStars(el,currentRating);});
        el.appendChild(s);
      })(i);
    }
  }
  drawStars(starsEl,currentRating);

// ── Auth & real-time listener ──────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
if(!user){window.location.href=’/account/login/’;return;}
document.getElementById(‘mobileAvatar’).textContent=initials(user.displayName||’’);

db.collection(‘jobs’)
.where(‘uid’,’==’,user.uid)

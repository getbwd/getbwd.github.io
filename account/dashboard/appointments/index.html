<style>
.job-list{display:flex;flex-direction:column;gap:14px;}
.job-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:24px;}
.job-card.highlight{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.job-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px 14px;cursor:pointer;user-select:none;}
.job-card-header:hover{background:#fafaf8;}
.job-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.job-card-id{font-size:11px;font-weight:400;color:var(--text-3);}
.job-card-meta{font-size:12px;color:var(--text-3);display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
.job-card-meta span{display:inline-flex;align-items:center;gap:4px;}
.job-card-body{padding:18px 20px;border-top:1px solid var(--border-light);display:flex;flex-direction:column;gap:16px;}
.job-card-body.collapsed{display:none;}
.detail-section-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.line-items{width:100%;border-collapse:collapse;font-size:13px;}
.line-items th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;padding:0 8px 6px 0;}
.line-items th:last-child,.line-items td:last-child{text-align:right;}
.line-items td{padding:6px 8px 6px 0;color:var(--text-2);border-top:1px solid var(--border-light);font-size:13px;}
.line-items .total-row td{font-weight:700;color:var(--text);border-top:2px solid var(--border);padding-top:8px;}
.note-block{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text-3);line-height:1.6;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-item{background:#fafaf8;border:1px solid var(--border-light);border-radius:8px;padding:10px 14px;}
.detail-item-label{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.detail-item-value{font-size:13px;color:var(--text-2);line-height:1.4;}
.rating-section{display:flex;flex-direction:column;gap:8px;}
.stars{display:flex;gap:4px;cursor:pointer;}
.star{font-size:24px;color:#ddd;transition:color 0.1s;user-select:none;}
.star.filled{color:#f5a623;}
.feedback-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);resize:vertical;min-height:70px;background:var(--white);}
.feedback-input:focus{outline:none;border-color:var(--orange);}
.btn-rate{margin-top:4px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;background:var(--orange);color:#fff;border:none;cursor:pointer;}
.btn-rate:hover{background:var(--orange-dark);}
.rate-thanks{font-size:13px;color:#1e8a4a;font-weight:500;margin-left:10px;}
.toggle-chevron{font-size:18px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;line-height:1;}
.job-card-body:not(.collapsed) ~ * .toggle-chevron,
.job-card.open .toggle-chevron{transform:rotate(180deg);}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
</style>
</head>

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function badge(status){
    var s=(status||'').toLowerCase().trim();
    var map={
        // Appointment statuses
        'scheduled':'bdg-scheduled',
        'rescheduled':'bdg-paused',
        'canceled':'bdg-cancelled',
        'cancelled':'bdg-cancelled',
        'completed':'bdg-completed',
        // Invoice statuses
        'draft':'bdg-default',
        'payment due':'bdg-unpaid',
        'paid':'bdg-paid',
        'overdue':'bdg-overdue',
        // Service statuses
        'active':'bdg-active',
        'paused':'bdg-paused',
        'on hold':'bdg-overdue',
        'terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function parseCSV(text){var rows=[];var lines=text.trim().split('\n');for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;for(var i=0;i<lines[l].length;i++){var c=lines[l][i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());rows.push(cols);}return rows;}
function parsePipe(str){return str?str.split('|').map(function(s){return s.trim();}).filter(Boolean):[];}
function parseLineItems(str){return parsePipe(str).map(function(seg){var p=seg.split(',').map(function(s){return s.trim();});var qty=parseFloat(p[1])||1;var unit=parseFloat(p[2])||0;return{name:p[0]||'—',qty:qty,unitPrice:unit,lineTotal:qty*unit};});}

var CSV_JOBS='https://docs.google.com/spreadsheets/d/e/2PACX-1vSHSfVRR2EnvXGH5nZBOesVJdoTl2p3bHun-oFYYSZrg7fEvGXyIDxPkycWTtCjWstt8ccFgpa8wlkg/pub?gid=0&single=true&output=csv';

async function cachedCSV(key,url){
    var cacheKey='bwd_csv_'+key;var cached=sessionStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached);}catch(e){}}
    var res=await fetch(url);var text=await res.text();
    var rows=parseCSV(text).slice(1);
    try{sessionStorage.setItem(cacheKey,JSON.stringify(rows));}catch(e){}
    return rows;}

function toggleCard(jobId){
    var body=document.getElementById('body-'+jobId);
    var card=document.getElementById('card-'+jobId);
    if(!body)return;
    var isOpen=!body.classList.contains('collapsed');
    body.classList.toggle('collapsed');
    card.classList.toggle('open',isOpen);
    // update URL hash without scroll
    if(!isOpen){history.replaceState(null,null,'#'+jobId);}
    else if(window.location.hash==='#'+jobId){history.replaceState(null,null,' ');}
}

        // Detail grid — address, assigned crew, invoice

        } else {
            ratingHTML='<div class="rating-section"><div class="detail-section-label">Rate this visit</div>'+
                '<div class="stars" id="stars-'+jobId+'"></div>'+
                '<textarea class="feedback-input" id="fb-'+jobId+'" placeholder="Leave feedback (optional)…"></textarea>'+
                '<div><button class="btn-rate" id="btn-'+jobId+'">Submit</button>'+

        }
    }

    // Staff action panel (visual only)
    var staffPanelHTML='';
    if(isStaffUser){
        var savedStaffNote=null;try{savedStaffNote=JSON.parse(localStorage.getItem('bwd_staff_'+jobId));}catch(e){}
        var staffNoteVal=savedStaffNote?savedStaffNote.note:'';
        var staffStatus=savedStaffNote&&savedStaffNote.status?savedStaffNote.status:status;

// Wire stars and feedback for customer non-scheduled jobs
if(!BWD.isStaff(role)){
    myJobs.forEach(function(r){
        var jobId=(r[0]||'').trim();
        var isScheduled=(r[2]||'').toLowerCase()==='scheduled';
        if(isScheduled)return;
        var starsEl=document.getElementById('stars-'+jobId);
        var btn=document.getElementById('btn-'+jobId);
        var fbEl=document.getElementById('fb-'+jobId);
        var thankEl=document.getElementById('thank-'+jobId);
        if(!starsEl)return;
        var saved=null;try{saved=JSON.parse(localStorage.getItem('bwd_review_'+jobId));}catch(e){}
        var currentRating=saved&&saved.rating?parseInt(saved.rating):0;
        function drawStars(){
            starsEl.innerHTML='';
            for(var i=1;i<=5;i++){
                (function(i){
                    var s=document.createElement('span');
                    s.className='star'+(i<=currentRating?' filled':'');
                    s.textContent='★';
                    s.addEventListener('mouseover',function(){starsEl.querySelectorAll('.star').forEach(function(el,idx){el.classList.toggle('filled',idx<i);});});
                    s.addEventListener('mouseout',drawStars);
                    s.addEventListener('click',function(){currentRating=i;drawStars();});
                    starsEl.appendChild(s);
                })(i);
            }
        }
        drawStars();
        if(btn){
            btn.addEventListener('click',function(){
                var fbText=fbEl?fbEl.value:'';
                try{localStorage.setItem('bwd_review_'+jobId,JSON.stringify({rating:currentRating,feedback:fbText}));}catch(e){}
                btn.textContent='Update Review';
                if(thankEl)thankEl.style.display='none';
                var conf=document.getElementById('conf-'+jobId);
                if(!conf){conf=document.createElement('span');conf.id='conf-'+jobId;conf.style.cssText='font-size:12px;color:#1e8a4a;font-weight:500;margin-left:10px;';btn.parentNode.appendChild(conf);}
                conf.textContent='Review saved!';
                setTimeout(function(){conf.textContent='You can edit and update it anytime.';conf.style.color='var(--text-3)';},2000);
            });
        }
    });
}

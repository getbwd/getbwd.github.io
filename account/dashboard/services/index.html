            <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item active" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>

    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">My Services</h1>
                <p class="section-sub">Your current lawn care plan.</p>
            </div>
            <div id="servicesContainer"><p style="color:#ccc;font-size:14px;">Loading…</p></div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: 'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',
    authDomain: 'bwd-accounts.firebaseapp.com',
    projectId: 'bwd-accounts',
    storageBucket: 'bwd-accounts.firebasestorage.app',
    messagingSenderId: '590001375282',
    appId: '1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();

document.getElementById('signOutBtn').addEventListener('click', function() {
    auth.signOut().then(function() { window.location.href = '/account/login/'; });
});
document.getElementById('mobileMenuBtn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('visible');
});
document.getElementById('sidebarOverlay').addEventListener('click', function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
});

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function badge(status){var s=(status||'').toLowerCase().trim();var map={scheduled:'bdg-scheduled',completed:'bdg-completed',cancelled:'bdg-cancelled',paid:'bdg-paid',unpaid:'bdg-unpaid',overdue:'bdg-overdue',active:'bdg-active',paused:'bdg-paused','in progress':'bdg-scheduled',pending:'bdg-paused',partial:'bdg-paused'};return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function parseCSV(text){var rows=[];var lines=text.trim().split('\n');for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;for(var i=0;i<lines[l].length;i++){var c=lines[l][i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());rows.push(cols);}return rows;}
async function fetchCSV(url){var res=await fetch(url);var text=await res.text();return parseCSV(text).slice(1);}
function parsePipe(str){return str?str.split('|').map(function(s){return s.trim();}).filter(Boolean):[];}
function parseServices(str){return parsePipe(str).map(function(seg){var p=seg.split(',').map(function(s){return s.trim();});return{name:p[0]||'—',frequency:p[1]||'—',price:parseFloat(p[2])||0,description:p[3]||''};});}

var CSV_SERVICES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRty-4hQ_sZ8nI55zoNkbnjZwOGi5-NgKgDGlvsjP3x0aOmeYWxIZKJRpKIXGFgdkEvr4xmXThjbuRB/pub?gid=0&single=true&output=csv';

auth.onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = '/account/login/'; return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');
    var uid = user.uid;

    var serviceRows = await fetchCSV(CSV_SERVICES);
    var myServices  = serviceRows.filter(function(r){return r[0]===uid;});
    var container   = document.getElementById('servicesContainer');

    if (!myServices.length) {
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('No services on your account yet.')+'</div></div>';
        return;
    }

    var svcRow     = myServices[0];
    var startDate  = svcRow[1] ? new Date(svcRow[1]).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—';
    var planStatus = svcRow[2]||'Active';
    var svcList    = parseServices(svcRow[3]);
    var isActive   = planStatus.toLowerCase()==='active';

    var headerHTML = '<div class="plan-header"><span class="plan-since">Plan started '+startDate+'</span>'+badge(planStatus)+'</div>';

    if (!svcList.length) {
        container.innerHTML = headerHTML+'<div class="card"><div class="card-body">'+empty('No services listed on your plan.')+'</div></div>';
        return;
    }

    var cardsHTML = svcList.map(function(s){
        return '<div class="svc-card"><div class="svc-card-header"><span class="svc-card-name">'+s.name+'</span>'+badge(isActive?'Active':planStatus)+'</div><p class="svc-detail"><strong>Frequency:</strong> '+s.frequency+'</p><p class="svc-detail"><strong>Price:</strong> '+fmtMoney(s.price)+'</p>'+(s.description?'<p class="svc-detail">'+s.description+'</p>':'')+'</div>';
    }).join('');

    container.innerHTML = headerHTML+'<div class="services-grid">'+cardsHTML+'</div>';
});
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Services | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
.plan-block{margin-bottom:28px;}
.plan-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.plan-block-meta{font-size:13px;color:var(--text-3);}
</style>
</head>
<body>
<div class="dash-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top"></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="/account/dashboard/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
      <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
      <a class="nav-item" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
      <a class="nav-item active" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
      <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>
  <header class="mobile-header">
    <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="mobile-brand">BWD Services</span>
    <div class="mobile-avatar" id="mobileAvatar">?</div>
  </header>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="dash-main">
    <div class="dash-page">
      <div class="section-header">
        <h1 class="section-title">My Services</h1>
        <p class="section-sub">Your current lawn care plan.</p>
      </div>
      <div id="servicesContainer"><p class="loading-text">Loading…</p></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
  projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
  messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth=firebase.auth();
var db=firebase.firestore();

function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function badge(status){
  var s=(status||'').toLowerCase().trim();
  var map={
    'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled',
    'cancelled':'bdg-cancelled','completed':'bdg-completed','draft':'bdg-default',
    'payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
    'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled'
  };
  return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}

document.getElementById('signOutBtn').addEventListener('click',function(){auth.signOut().then(function(){window.location.href='/account/login/';});});
document.getElementById('mobileMenuBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('visible');});
document.getElementById('sidebarOverlay').addEventListener('click',function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('visible');});

function renderServices(plans){
  var container=document.getElementById('servicesContainer');

  if(!plans.length){
    container.innerHTML='<div class="card"><div class="card-body">'+empty('No services on your account yet.')+'</div></div>';
    return;
  }

  var html='';

  plans.forEach(function(plan,planIdx){
    var planStatus=plan.status||'Active';
    var isActive=planStatus.toLowerCase()==='active';
    var svcList=plan.services||[];

    var dateStr='';
    if(plan.startDate){
      var d=plan.startDate&&plan.startDate.toDate?plan.startDate.toDate():new Date(plan.startDate);
      try{dateStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch(e){}
    }

    html+='<div class="plan-block">';
    if(plans.length>1){
      html+='<div class="plan-block-header">';
      if(dateStr)html+='<span class="plan-block-meta">Started '+dateStr+'</span>';
      html+=badge(planStatus);
      html+='</div>';
    } else {
      if(dateStr){html+='<div class="plan-block-header"><span class="plan-block-meta">Plan started '+dateStr+'</span>'+badge(planStatus)+'</div>';}
    }

    if(!svcList.length){
      html+='<div class="card"><div class="card-body">'+empty('No services listed on this plan.')+'</div></div>';
    } else {
      html+='<div class="services-grid">';
      svcList.forEach(function(s){
        html+='<div class="svc-card">';
        html+='<div class="svc-card-header"><span class="svc-card-name">'+s.name+'</span>'+badge(isActive?'Active':planStatus)+'</div>';
        html+='<p class="svc-detail"><strong>Frequency:</strong> '+s.frequency+'</p>';
        html+='<p class="svc-detail"><strong>Price:</strong> '+fmtMoney(s.price||0)+'</p>';
        if(s.description)html+='<p class="svc-detail">'+s.description+'</p>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';

    if(planIdx<plans.length-1){
      html+='<hr style="border:none;border-top:1px solid var(--border);margin:0 0 28px;">';
    }
  });

  container.innerHTML=html;
}

auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='/account/login/';return;}
  document.getElementById('mobileAvatar').textContent=initials(user.displayName||'');

  db.collection('services')
    .where('uid','==',user.uid)
    .orderBy('startDate','desc')
    .onSnapshot(function(snap){
      var plans=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      renderServices(plans);
    });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Services | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="dashboard.css">
<style>
.loading-text{color:#ccc;font-size:14px;}

.plan-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.plan-since  { font-size: 13px; color: var(--text-3); }
.plan-status-badge { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="index.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item" href="appointments.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item" href="invoices.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item active" href="services.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="account.html"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>
    </aside>
    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">My Services</h1>
                <p class="section-sub">Your current lawn care plan.</p>
            </div>
            <div id="servicesContainer"><p class="loading-text">Loading…</p></div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="dashboard.js"></script>
<script>
initFirebase();
const auth = firebase.auth();
initSidebar();
initSignOut(auth, 'signOutBtn');

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/account/login/'); return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');
    const uid = user.uid;

    const serviceRows = await fetchCSV(CSV.SERVICES);
    const myServices  = serviceRows.filter(r => r[0] === uid);

    const container = document.getElementById('servicesContainer');

    if (!myServices.length) {
        container.innerHTML = `<div class="card"><div class="card-body">${empty('No services on your account yet.')}</div></div>`;
        return;
    }

    const svcRow    = myServices[0]; // one row per customer
    const startDate = svcRow[1] ? new Date(svcRow[1]).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '—';
    const planStatus = svcRow[2] || 'Active';
    const svcList   = parseServices(svcRow[3]);
    const isActive  = planStatus.toLowerCase() === 'active';

    const planHeaderHTML = `
        <div class="plan-header">
            <span class="plan-since">Plan started ${startDate}</span>
            <div class="plan-status-badge">${badge(planStatus)}</div>
        </div>`;

    if (!svcList.length) {
        container.innerHTML = planHeaderHTML + `<div class="card"><div class="card-body">${empty('No services listed on your plan.')}</div></div>`;
        return;
    }

    const cardsHTML = svcList.map(s => `
        <div class="svc-card">
            <div class="svc-card-header">
                <span class="svc-card-name">${s.name}</span>
                ${badge(isActive ? 'Active' : planStatus)}
            </div>
            <p class="svc-detail"><strong>Frequency:</strong> ${s.frequency}</p>
            <p class="svc-detail"><strong>Price:</strong> ${fmtMoney(s.price)}</p>
            ${s.description ? `<p class="svc-detail">${s.description}</p>` : ''}
        </div>`).join('');

    container.innerHTML = planHeaderHTML + `<div class="services-grid">${cardsHTML}</div>`;
});
</script>
</body>
</html>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){ auth.signOut().then(function(){ window.location.href='/account/login/'; }); });
document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); });
document.getElementById('sidebarOverlay').addEventListener('click', function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s = (status||'').toLowerCase().trim();
    var map = {
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled','seasonal':'bdg-paused',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){ return '<p class="empty-state">'+msg+'</p>'; }

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href = '/account/login/'; return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');

    var container = document.getElementById('servicesContainer');

    var docSnap;
    try {
        docSnap = await db.collection('services').doc(user.uid).get();
    } catch(e) {
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('Failed to load services.')+'</div></div>';
        console.error(e);
        return;
    }

    if(!docSnap.exists || !Array.isArray(docSnap.data().services) || !docSnap.data().services.length){
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('No services on your account yet.')+'</div></div>';
        return;
    }

    // The Firestore doc is services/{uid} with a single `services` array
    var svcList = docSnap.data().services;

    // Split into active/inactive groups for display
    var active   = svcList.filter(function(s){ return ['active','seasonal'].indexOf((s.status||'').toLowerCase()) !== -1; });
    var inactive = svcList.filter(function(s){ return ['active','seasonal'].indexOf((s.status||'').toLowerCase()) === -1; });

    function renderCard(s){
        var startStr = '';
        if(s.startDate){
            try{ startStr = s.startDate.toDate().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }catch(e){}
        }

        var html = '<div class="svc-card">';
        html += '<div class="svc-card-header"><span class="svc-card-name">'+s.name+'</span>'+badge(s.status)+'</div>';
        html += '<p class="svc-detail"><strong>Frequency:</strong> '+s.frequency+'</p>';

        // Pricing: show prepay balance if applicable, otherwise per-visit price
        if(s.prepay && s.prepay.enabled){
            var pct = s.prepay.visitsIncluded > 0 ? Math.round((s.prepay.visitsPending / s.prepay.visitsIncluded) * 100) : 0;
            html += '<p class="svc-detail"><strong>Prepaid:</strong> '+s.prepay.visitsPending+' of '+s.prepay.visitsIncluded+' visits remaining ('+fmtMoney(s.prepay.amountPaid)+' paid)</p>';
            html += '<div class="prepay-bar"><div class="prepay-bar-fill" style="width:'+pct+'%"></div></div>';
            html += '<div class="prepay-label">'+pct+'% of prepaid visits remaining</div>';
        } else {
            html += '<p class="svc-detail"><strong>Price:</strong> '+fmtMoney(s.pricePerVisit)+' / visit</p>';
        }

        if(s.notes) html += '<p class="svc-detail">'+s.notes+'</p>';
        if(startStr) html += '<p class="svc-detail" style="color:var(--text-3);font-size:12px;">Started '+startStr+'</p>';
        html += '</div>';
        return html;
    }

    var html = '';

    if(active.length){
        html += '<div class="plan-block">';
        html += '<div class="plan-block-header"><span class="plan-block-meta">Active services</span></div>';
        html += '<div class="services-grid">';
        active.forEach(function(s){ html += renderCard(s); });
        html += '</div></div>';
    }

    if(inactive.length){
        if(active.length) html += '<hr style="border:none;border-top:1px solid var(--border);margin:0 0 28px;">';
        html += '<div class="plan-block">';
        html += '<div class="plan-block-header"><span class="plan-block-meta">Inactive services</span></div>';
        html += '<div class="services-grid">';
        inactive.forEach(function(s){ html += renderCard(s); });
        html += '</div></div>';
    }

    container.innerHTML = html;
});
</script>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoices | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
.inv-list{display:flex;flex-direction:column;gap:14px;}
.inv-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:24px;}
.inv-card.highlight{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}

.inv-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:16px 20px;cursor:pointer;user-select:none;}
.inv-card-header:hover{background:#fafaf8;}
.inv-header-left{flex:1;min-width:0;}
.inv-card-title{font-size:15px;font-weight:700;color:var(–text);margin-bottom:4px;}
.inv-card-meta{font-size:12px;color:var(–text-3);margin-bottom:6px;}
.inv-header-right{text-align:right;flex-shrink:0;}
.inv-total-amt{font-size:20px;font-weight:800;color:var(–text);line-height:1.1;margin-bottom:4px;}
.inv-remaining{font-size:12px;color:var(–text-3);margin-bottom:5px;}

.inv-card-body{border-top:1px solid var(–border-light);padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.inv-card-body.collapsed{display:none;}

.inv-section-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;margin-bottom:8px;}
.line-items{width:100%;border-collapse:collapse;font-size:13px;}
.line-items th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;padding:0 8px 6px 0;}
.line-items th:last-child,.line-items td:last-child{text-align:right;}
.line-items td{padding:6px 8px 6px 0;color:var(–text-2);border-top:1px solid var(–border-light);}
.line-items .total-row td{font-weight:700;color:var(–text);border-top:2px solid var(–border);padding-top:8px;}

.pay-history{display:flex;flex-direction:column;}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #faf9f6;font-size:13px;color:var(–text-2);}
.pay-row:last-child{border-bottom:none;}
.pay-amount{font-weight:600;color:#1e8a4a;font-variant-numeric:tabular-nums;}

.balance-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;border-top:2px solid var(–border);font-size:14px;font-weight:700;}
.balance-due{color:#d93025;}
.balance-clear{color:#1e8a4a;}

.toggle-chevron{font-size:18px;color:var(–muted);transition:transform 0.2s;flex-shrink:0;line-height:1;margin-top:2px;}
</style>

</head>

<script>
var BWD=window.BWD||{};
BWD.STAFF_ROLES=['Field Tech','Lead Tech','Operations Manager','Administrator'];
BWD.isStaff=function(r){return BWD.STAFF_ROLES.indexOf(r)!==-1;};
BWD.buildNav=function(active,role){
    var I='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">';
    var icons={
        overview:   I+'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        appointments:I+'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
        invoices:   I+'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
        services:   I+'<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>',
        credits:    I+'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
        account:    I+'<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'
    };
    var labels={overview:'Overview',appointments:'Appointments',invoices:'Invoices',services:'My Services',credits:'Credits & Deals',account:'Account'};
    var cust=['overview','appointments','invoices','services','credits','account'];
    var staff=['appointments','invoices','account'];
    var hrefs={
        overview:'/account/dashboard/',appointments:'/account/dashboard/appointments/',
        invoices:'/account/dashboard/invoices/',services:'/account/dashboard/services/',
        credits:'/account/dashboard/credits/',account:'/account/dashboard/account/'
    };
    var items=BWD.isStaff(role)?staff:cust;
    return items.map(function(id){
        return '<a class="nav-item'+(id===active?' active':'')+'" href="'+hrefs[id]+'">'+icons[id]+labels[id]+'</a>';
    }).join('');
};
BWD.injectNav=function(active,role){
    var n=document.getElementById('sidebarNav');
    if(n)n.innerHTML=BWD.buildNav(active,role);
};
BWD.initSidebar=function(){
    var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay'),btn=document.getElementById('mobileMenuBtn');
    if(btn)btn.addEventListener('click',function(){sb.classList.add('open');ov.classList.add('visible');});
    if(ov)ov.addEventListener('click',function(){sb.classList.remove('open');ov.classList.remove('visible');});
};
BWD.initSignOut=function(auth){
    ['signOutBtn','signOutBtn2'].forEach(function(id){
        var el=document.getElementById(id);
        if(el)el.addEventListener('click',function(){auth.signOut().then(function(){window.location.href='/account/login/';});});
    });
};
</script>

<script>
if(!firebase.apps.length){firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',
    authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',
    storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',
    appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});}
var auth=firebase.auth();
var db=firebase.firestore();
BWD.initSidebar();
BWD.initSignOut(auth);
document.getElementById('signOutBtn').addEventListener('click',function(){auth.signOut().then(function(){window.location.href='/account/login/';});});
function initials(n){return n?n.trim().split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2):'?';}
function fmtMoney(n){return '$'+Number(n).toFixed(2);}
function badge(status){
    var s=(status||'').toLowerCase().trim();
    var map={
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){return '<p class="empty-state">'+msg+'</p>';}
function parseCSV(text){var rows=[];var lines=text.trim().split('\n');for(var l=0;l<lines.length;l++){var cols=[];var cur='';var inQ=false;for(var i=0;i<lines[l].length;i++){var c=lines[l][i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());rows.push(cols);}return rows;}
function parsePipe(str){return str?str.split('|').map(function(s){return s.trim();}).filter(Boolean):[];}
function parseLineItems(str){return parsePipe(str).map(function(seg){var p=seg.split(',').map(function(s){return s.trim();});var qty=parseFloat(p[1])||1;var unit=parseFloat(p[2])||0;return{name:p[0]||'—',qty:qty,unitPrice:unit,lineTotal:qty*unit};});}
function parsePayments(str){return parsePipe(str).map(function(seg){var p=seg.split(',').map(function(s){return s.trim();});return{date:p[0]||'—',type:p[1]||'—',amount:parseFloat(p[2])||0};});}
function invoiceBalance(items,payments){var t=items.reduce(function(s,i){return s+i.lineTotal;},0);var p=payments.reduce(function(s,p){return s+p.amount;},0);return Math.max(0,Math.round((t-p)*100)/100);}

var CSV_INVOICES='https://docs.google.com/spreadsheets/d/e/2PACX-1vSWX3vado-d6wVWtj4HT_rq9xLYMG-HqYC2wEOLVIefdWjflDEe6XoC3uClWCqWUXqSvYe4Z35HN3TM/pub?gid=0&single=true&output=csv';

async function cachedCSV(key,url){var cacheKey='bwd_csv_'+key;var cached=sessionStorage.getItem(cacheKey);if(cached){try{return JSON.parse(cached);}catch(e){}}var res=await fetch(url);var text=await res.text();var rows=parseCSV(text).slice(1);try{sessionStorage.setItem(cacheKey,JSON.stringify(rows));}catch(e){}return rows;}

function toggleInv(invId){
    var body=document.getElementById('inv-body-'+invId);
    var chevron=document.getElementById('chev-'+invId);
    if(!body)return;
    var collapsed=body.classList.toggle('collapsed');
    if(chevron)chevron.style.transform=collapsed?'':'rotate(180deg)';
    if(!collapsed){history.replaceState(null,null,'#'+invId);}
    else if(window.location.hash==='#'+invId){history.replaceState(null,null,' ');}
}

auth.onAuthStateChanged(async function(user){
    if(!user){window.location.href='/account/login/';return;}
    var role='Homeowner';
    try{var rdoc=await db.collection('customers').doc(user.uid).get();if(rdoc.exists&&rdoc.data().role)role=rdoc.data().role;}catch(e){}
    BWD.injectNav('invoices',role);
    document.getElementById('mobileAvatar').textContent=initials(user.displayName||'');
    var uid=user.uid;

    var invoiceRows=await cachedCSV('invoices',CSV_INVOICES);
    var myInvoices=invoiceRows.filter(function(r){return r[1]===uid && (r[3]||'').toLowerCase()!=='draft';}).sort(function(a,b){return new Date(b[4])-new Date(a[4]);});
    var container=document.getElementById('invListContainer');

    if(!myInvoices.length){container.innerHTML='<div class="card"><div class="card-body">'+empty('No invoices on your account yet.')+'</div></div>';return;}

    var targetHash=window.location.hash.replace('#','');
    var html='<div class="inv-list">';

    myInvoices.forEach(function(r){
        // cols: 0=ID, 1=UID, 2=JOB_ID, 3=STATUS, 4=DATE, 5=ITEMIZED, 6=PAYMENT_HISTORY
        var invId   =(r[0]||'').trim();
        var jobId   = r[2]||'';
        var status  = r[3]||'Unpaid';
        var rawDate = r[4]||'';
        var items   = parseLineItems(r[5]);
        var payments= parsePayments(r[6]);
        var total   = items.reduce(function(s,i){return s+i.lineTotal;},0);
        var paidAmt = payments.reduce(function(s,p){return s+p.amount;},0);
        var balance = invoiceBalance(items,payments);
        var desc    = items.map(function(i){return i.name;}).join(', ')||'Invoice';
        var isTarget= invId===targetHash;

        var dateStr='—';
        if(rawDate){try{dateStr=new Date(rawDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){dateStr=rawDate;}}

        var metaParts=dateStr+' · Invoice #'+invId+(jobId?' · <a href="/account/dashboard/appointments/#'+jobId+'" style="color:var(--orange);">Job #'+jobId+'</a>':'');

        // Line items
        var lineItemsHTML='';
        if(items.length){
            lineItemsHTML='<div><table class="line-items"><tr><th>Service</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>'+
                items.map(function(i){return '<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fmtMoney(i.unitPrice)+'</td><td>'+fmtMoney(i.lineTotal)+'</td></tr>';}).join('')+
                '<tr class="total-row"><td colspan="3">Invoice Total</td><td>'+fmtMoney(total)+'</td></tr></table></div>';}

        // Payment history
        var payHTML='';
        if(payments.length){
            payHTML='<div><div class="inv-section-label">Payment History</div><div class="pay-history">'+
                payments.map(function(p){return '<div class="pay-row"><span>'+p.date+' · '+p.type+'</span><span class="pay-amount">+'+fmtMoney(p.amount)+'</span></div>';}).join('')+
                '</div><div class="balance-summary"><span>'+(balance>=0.01?'Balance Remaining':'Fully Paid')+'</span><span class="'+(balance>=0.01?'balance-due':'balance-clear')+'">'+fmtMoney(balance)+'</span></div></div>';
        } else if(total>0){
            payHTML='<div class="balance-summary"><span>Balance Due</span><span class="balance-due">'+fmtMoney(total)+'</span></div>';}

        var bodyClass='inv-card-body'+(isTarget?'':' collapsed');

        html+='<div class="inv-card'+(isTarget?' highlight':'')+'" id="inv-card-'+invId+'">';
        html+='<div class="inv-card-header" onclick="toggleInv(\''+invId+'\')">';
        html+='<div class="inv-header-left">';
        html+='<div class="inv-card-title">'+desc+'</div>';
        html+='<div class="inv-card-meta">'+metaParts+'</div>';
        html+=badge(status);
        html+='</div>';
        html+='<div class="inv-header-right">';
        html+='<div class="inv-total-amt">'+fmtMoney(total)+'</div>';
        if(balance>=0.01&&balance<total)html+='<div class="inv-remaining">'+fmtMoney(balance)+' remaining</div>';
        html+='<span class="toggle-chevron" id="chev-'+invId+'" style="'+(isTarget?'transform:rotate(180deg)':'')+'">▾</span>';
        html+='</div>';
        html+='</div>';
        html+='<div class="'+bodyClass+'" id="inv-body-'+invId+'">';
        html+=lineItemsHTML+payHTML;
        html+='</div></div>';
    });

    html+='</div>';
    container.innerHTML=html;

    if(targetHash){
        var el=document.getElementById('inv-card-'+targetHash);
        if(el)setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'});},100);
    }
});
</script>

</body>

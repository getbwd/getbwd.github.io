<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoices | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
</head>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/account/dashboard/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item active" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>
    </aside>
    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">Invoices</h1>
                <p class="section-sub">Your billing history and outstanding payments.</p>
            </div>
            <div id="invListContainer"><p class="loading-text">Loading…</p></div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="../../../js/dashboard.js"></script>
<script>
initFirebase();
const auth = firebase.auth();
initSidebar();
initSignOut(auth, 'signOutBtn');

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/account/login/'); return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');
    const uid = user.uid;

    const invoiceRows = await fetchCSV(CSV.INVOICES);
    const myInvoices  = invoiceRows.filter(r => r[1] === uid).sort((a,b) => new Date(b[4]) - new Date(a[4]));

    const container = document.getElementById('invListContainer');
    if (!myInvoices.length) {
        container.innerHTML = `<div class="card"><div class="card-body">${empty('No invoices on your account yet.')}</div></div>`;
        return;
    }

    container.innerHTML = `<div class="inv-list">${myInvoices.map((r, idx) => {
        const invId    = r[0]||'—';
        const jobId    = r[2]||'';
        const status   = r[3]||'Unpaid';
        const date     = r[4] ? new Date(r[4]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
        const items    = parseLineItems(r[5]);
        const payments = parsePayments(r[6]);
        const total    = items.reduce((s,i)=>s+i.lineTotal,0);
        const paid     = payments.reduce((s,p)=>s+p.amount,0);
        const balance  = Math.max(0, total - paid);
        const desc     = items.map(i=>i.name).join(', ')||'Invoice';

        const lineItemsHTML = items.length ? `
            <div>
                <div class="inv-section-label">Services</div>
                <table class="line-items">
                    <tr><th>Service</th><th>Qty</th><th class="right">Unit Price</th><th class="right">Total</th></tr>
                    ${items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td class="right">${fmtMoney(i.unitPrice)}</td><td class="right">${fmtMoney(i.lineTotal)}</td></tr>`).join('')}
                    <tr class="total-row"><td colspan="3">Invoice Total</td><td class="right">${fmtMoney(total)}</td></tr>
                </table>
            </div>` : '';

        const payHistHTML = payments.length ? `
            <div>
                <div class="inv-section-label">Payment History</div>
                <div class="pay-history">
                    ${payments.map(p=>`<div class="pay-row"><span>${p.date} · ${p.type}</span><span class="pay-amount">+${fmtMoney(p.amount)}</span></div>`).join('')}
                    <div class="balance-row">
                        <span>Balance ${balance > 0 ? 'Remaining' : 'Settled'}</span>
                        <span class="${balance > 0 ? 'balance-due' : 'balance-paid'}">${fmtMoney(balance)}</span>
                    </div>
                </div>
            </div>` : (total > 0 ? `<div class="balance-row"><span>Balance Due</span><span class="balance-due">${fmtMoney(total)}</span></div>` : '');

        return `
        <div class="inv-card">
            <div class="inv-card-header">
                <div>
                    <div class="inv-card-title">${desc}</div>
                    <div class="inv-card-meta">${date} · Invoice #${invId}${jobId ? ` · Job #${jobId}` : ''}</div>
                    <button class="inv-toggle" onclick="toggleInv(${idx})">View details</button>
                </div>
                <div class="inv-card-right">
                    <div class="inv-total">${fmtMoney(total)}</div>
                    ${balance > 0 && balance < total ? `<div class="inv-balance">${fmtMoney(balance)} remaining</div>` : ''}
                    ${badge(status)}
                </div>
            </div>
            <div class="inv-card-body collapsed" id="inv-body-${idx}">
                ${lineItemsHTML}${payHistHTML}
            </div>
        </div>`;
    }).join('')}</div>`;
});

function toggleInv(idx) {
    const body = document.getElementById(`inv-body-${idx}`);
    const btn  = body.closest('.inv-card').querySelector('.inv-toggle');
    const collapsed = body.classList.toggle('collapsed');
    btn.textContent = collapsed ? 'View details' : 'Hide details';
}
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoices | BWD Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="../../../css/dashboard.css">
<style>
.inv-list{display:flex;flex-direction:column;gap:14px;}
.inv-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:24px;}
.inv-card.highlight{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}

.inv-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:16px 20px;cursor:pointer;user-select:none;}
.inv-card-header:hover{background:#fafaf8;}
.inv-header-left{flex:1;min-width:0;}
.inv-card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.inv-card-meta{font-size:12px;color:var(--text-3);margin-bottom:6px;}
.inv-header-right{text-align:right;flex-shrink:0;}
.inv-total-amt{font-size:20px;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:4px;}
.inv-remaining{font-size:12px;color:var(--text-3);margin-bottom:5px;}

.inv-card-body{border-top:1px solid var(--border-light);padding:18px 20px;display:flex;flex-direction:column;gap:16px;}
.inv-card-body.collapsed{display:none;}

.inv-section-label{font-size:10px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:#bbb;margin-bottom:8px;}
.line-items{width:100%;border-collapse:collapse;font-size:13px;}
.line-items th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#bbb;padding:0 8px 6px 0;}
.line-items th:last-child,.line-items td:last-child{text-align:right;}
.line-items td{padding:6px 8px 6px 0;color:var(--text-2);border-top:1px solid var(--border-light);}
.line-items .total-row td{font-weight:700;color:var(--text);border-top:2px solid var(--border);padding-top:8px;}

.pay-history{display:flex;flex-direction:column;}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #faf9f6;font-size:13px;color:var(--text-2);}
.pay-row:last-child{border-bottom:none;}
.pay-amount{font-weight:600;color:#1e8a4a;font-variant-numeric:tabular-nums;}

.balance-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;border-top:2px solid var(--border);font-size:14px;font-weight:700;}
.balance-due{color:#d93025;}
.balance-clear{color:#1e8a4a;}

.toggle-chevron{font-size:18px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;line-height:1;margin-top:2px;}
</style>

</head>
<body>
<div class="dash-shell">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top"></div>
        <nav class="sidebar-nav">
            <a class="nav-item" href="/account/dashboard/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
            <a class="nav-item" href="/account/dashboard/appointments/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Appointments</a>
            <a class="nav-item active" href="/account/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
            <a class="nav-item" href="/account/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>My Services</a>
            <a class="nav-item" href="/account/dashboard/account/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Account</a>
        </nav>
        <div class="sidebar-footer">
            <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
        </div>
    </aside>
    <header class="mobile-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="mobile-brand">BWD Services</span>
        <div class="mobile-avatar" id="mobileAvatar">?</div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="dash-main">
        <div class="dash-page">
            <div class="section-header">
                <h1 class="section-title">Invoices</h1>
                <p class="section-sub">Your billing history and outstanding payments.</p>
            </div>
            <div id="invListContainer"><p style="color:#ccc;font-size:14px;">Loading…</p></div>
        </div>
    </main>

</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){ auth.signOut().then(function(){ window.location.href='/account/login/'; }); });
document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); });
document.getElementById('sidebarOverlay').addEventListener('click', function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s = (status||'').toLowerCase().trim();
    var map = {
        'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed',
        'draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue',
        'active':'bdg-active','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled',
    };
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){ return '<p class="empty-state">'+msg+'</p>'; }

function toggleInv(invId){
    var body    = document.getElementById('inv-body-'+invId);
    var chevron = document.getElementById('chev-'+invId);
    if(!body) return;
    var collapsed = body.classList.toggle('collapsed');
    if(chevron) chevron.style.transform = collapsed ? '' : 'rotate(180deg)';
    if(!collapsed){ history.replaceState(null, null, '#'+invId); }
    else if(window.location.hash === '#'+invId){ history.replaceState(null, null, ' '); }
}

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href = '/account/login/'; return; }
    document.getElementById('mobileAvatar').textContent = initials(user.displayName||'');

    var container  = document.getElementById('invListContainer');
    var targetHash = window.location.hash.replace('#','');

    var snapshot;
    try {
        snapshot = await db.collection('invoices')
            .where('uid', '==', user.uid)
            .orderBy('dateIssued', 'desc')
            .get();
    } catch(e) {
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('Failed to load invoices.')+'</div></div>';
        console.error(e);
        return;
    }

    // Normalize each Firestore doc, filtering out drafts
    var invoices = [];
    snapshot.forEach(function(doc){
        var d = doc.data();
        if((d.status||'').toLowerCase() === 'draft') return;
        invoices.push({
            invId:      doc.id,
            jobId:      d.jobId      || '',
            status:     d.status     || 'Payment Due',
            dateIssued: d.dateIssued ? d.dateIssued.toDate() : null,  // Firestore Timestamp → JS Date
            items:      Array.isArray(d.items)    ? d.items    : [],   // [{name, qty, unitPrice}]
            payments:   Array.isArray(d.payments) ? d.payments : [],   // [{date (Timestamp), type, amount}]
        });
    });

    if(!invoices.length){
        container.innerHTML = '<div class="card"><div class="card-body">'+empty('No invoices on your account yet.')+'</div></div>';
        return;
    }

    var html = '<div class="inv-list">';

    invoices.forEach(function(inv){
        var invId    = inv.invId;
        var isTarget = invId === targetHash;

        // Compute totals
        var items = inv.items.map(function(it){
            var qty  = Number(it.qty)       || 1;
            var unit = Number(it.unitPrice) || 0;
            return { name: it.name||'—', qty: qty, unitPrice: unit, lineTotal: qty*unit };
        });
        var total   = items.reduce(function(s,i){ return s+i.lineTotal; }, 0);
        var paidAmt = inv.payments.reduce(function(s,p){ return s+Number(p.amount||0); }, 0);
        var balance = Math.max(0, Math.round((total - paidAmt) * 100) / 100);
        var desc    = items.map(function(i){ return i.name; }).join(', ') || 'Invoice';

        // Format issue date
        var dateStr = '—';
        if(inv.dateIssued){
            try{ dateStr = inv.dateIssued.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
            catch(e){ dateStr = inv.dateIssued.toString(); }
        }

        var metaParts = dateStr + ' · Invoice #' + invId +
            (inv.jobId ? ' · <a href="/account/dashboard/appointments/#'+inv.jobId+'" style="color:var(--orange);">Job #'+inv.jobId+'</a>' : '');

        // Line items table
        var lineItemsHTML = '';
        if(items.length){
            lineItemsHTML = '<div><table class="line-items">'+
                '<tr><th>Service</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>'+
                items.map(function(i){
                    return '<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fmtMoney(i.unitPrice)+'</td><td>'+fmtMoney(i.lineTotal)+'</td></tr>';
                }).join('')+
                '<tr class="total-row"><td colspan="3">Invoice Total</td><td>'+fmtMoney(total)+'</td></tr>'+
                '</table></div>';
        }

        // Payment history
        var payHTML = '';
        if(inv.payments.length){
            payHTML = '<div><div class="inv-section-label">Payment History</div><div class="pay-history">'+
                inv.payments.map(function(p){
                    // p.date is a Firestore Timestamp
                    var payDate = '—';
                    try{ payDate = p.date.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){}
                    return '<div class="pay-row"><span>'+payDate+' · '+(p.type||'—')+'</span><span class="pay-amount">+'+fmtMoney(p.amount)+'</span></div>';
                }).join('')+
                '</div>'+
                '<div class="balance-summary">'+
                '<span>'+(balance >= 0.01 ? 'Balance Remaining' : 'Fully Paid')+'</span>'+
                '<span class="'+(balance >= 0.01 ? 'balance-due' : 'balance-clear')+'">'+fmtMoney(balance)+'</span>'+
                '</div></div>';
        } else if(total > 0){
            payHTML = '<div class="balance-summary"><span>Balance Due</span><span class="balance-due">'+fmtMoney(total)+'</span></div>';
        }

        var bodyClass = 'inv-card-body' + (isTarget ? '' : ' collapsed');

        html += '<div class="inv-card'+(isTarget?' highlight':'')+'" id="inv-card-'+invId+'">';
        html += '<div class="inv-card-header" onclick="toggleInv(\''+invId+'\')">';
        html += '<div class="inv-header-left">';
        html += '<div class="inv-card-title">'+desc+'</div>';
        html += '<div class="inv-card-meta">'+metaParts+'</div>';
        html += badge(inv.status);
        html += '</div>';
        html += '<div class="inv-header-right">';
        html += '<div class="inv-total-amt">'+fmtMoney(total)+'</div>';
        if(balance >= 0.01 && balance < total) html += '<div class="inv-remaining">'+fmtMoney(balance)+' remaining</div>';
        html += '<span class="toggle-chevron" id="chev-'+invId+'" style="'+(isTarget?'transform:rotate(180deg)':'')+'">▾</span>';
        html += '</div>';
        html += '</div>';
        html += '<div class="'+bodyClass+'" id="inv-body-'+invId+'">';
        html += lineItemsHTML + payHTML;
        html += '</div></div>';
    });

    html += '</div>';
    container.innerHTML = html;

    if(targetHash){
        var el = document.getElementById('inv-card-'+targetHash);
        if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
    }
});
</script>

</body>
</html>

<style>
.inv-list { display: flex; flex-direction: column; gap: 14px; }
.inv-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; scroll-margin-top: 24px; }
.inv-card.highlight { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-dim); }
.inv-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 16px 20px; cursor: pointer; user-select: none; }
.inv-card-header:hover { background: #fafaf8; }
.inv-header-left { flex: 1; min-width: 0; }
.inv-card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.inv-card-meta { font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
.inv-header-right { text-align: right; flex-shrink: 0; }
.inv-total-amt { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
.inv-remaining { font-size: 12px; color: var(--text-3); margin-bottom: 5px; }
.inv-card-body { border-top: 1px solid var(--border-light); padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.inv-card-body.collapsed { display: none; }
.inv-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }
.line-items { width: 100%; border-collapse: collapse; font-size: 13px; }
.line-items th { text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #bbb; padding: 0 8px 6px 0; }
.line-items th:last-child, .line-items td:last-child { text-align: right; }
.line-items td { padding: 6px 8px 6px 0; color: var(--text-2); border-top: 1px solid var(--border-light); }
.line-items .total-row td { font-weight: 700; color: var(--text); border-top: 2px solid var(--border); padding-top: 8px; }
.pay-history { display: flex; flex-direction: column; }
.pay-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #faf9f6; font-size: 13px; color: var(--text-2); }
.pay-row:last-child { border-bottom: none; }
.pay-amount { font-weight: 600; color: #1e8a4a; font-variant-numeric: tabular-nums; }
.balance-summary { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 0; border-top: 2px solid var(--border); font-size: 14px; font-weight: 700; }
.balance-due { color: #d93025; }
.balance-clear { color: #1e8a4a; }
.toggle-chevron { font-size: 18px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; line-height: 1; margin-top: 2px; }
.inv-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 4px; border-top: 1px solid var(--border-light); }
</style>
</head>

        <div class="modal-body">
            <input type="hidden" id="editInvId">
            <div class="form-row">
                <label class="form-label">Customer</label>

            <div class="form-row-2">

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){ auth.signOut().then(function(){ window.location.href='/staff/login/'; }); });
document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); });
document.getElementById('sidebarOverlay').addEventListener('click', function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s=(status||'').toLowerCase().trim();
    var map={'scheduled':'bdg-scheduled','rescheduled':'bdg-paused','canceled':'bdg-cancelled','cancelled':'bdg-cancelled','completed':'bdg-completed','draft':'bdg-default','payment due':'bdg-unpaid','paid':'bdg-paid','overdue':'bdg-overdue'};
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}
function empty(msg){ return '<p class="empty-state">'+msg+'</p>'; }
function invoiceBalance(inv){
    var total = inv.items.reduce(function(s,i){ return s+Number(i.qty||1)*Number(i.unitPrice||0); },0);
    var paid  = inv.payments.reduce(function(s,p){ return s+Number(p.amount||0); },0);
    return Math.max(0, Math.round((total-paid)*100)/100);
}

var allInvoices = [];
var custNames   = {};
var custList    = [];
var invLineItems = [];
var invPayments  = [];

// ── Line item helpers ──
function updateInvLineTotal(){
    var t = invLineItems.reduce(function(s,li){ return s+Number(li.qty||0)*Number(li.price||0); },0);
    document.getElementById('invLineTotal').textContent = t>0 ? 'Total: '+fmtMoney(t) : '';
}
function renderInvLines(){
    document.getElementById('invLineItems').innerHTML = invLineItems.map(function(li,i){
        return '<div class="line-item-row" style="margin-bottom:6px;">'+
            '<input class="form-input" type="text" placeholder="Description" value="'+li.name+'" oninput="invLineItems['+i+'].name=this.value">'+
            '<input class="form-input" type="number" min="1" value="'+li.qty+'" oninput="invLineItems['+i+'].qty=this.value;updateInvLineTotal()">'+
            '<input class="form-input" type="number" min="0" step="0.01" placeholder="0.00" value="'+li.price+'" oninput="invLineItems['+i+'].price=this.value;updateInvLineTotal()">'+
            '<button class="btn-remove-line" onclick="removeInvLine('+i+')">✕</button>'+
            '</div>';
    }).join('');
    updateInvLineTotal();
}
function removeInvLine(i){ invLineItems.splice(i,1); renderInvLines(); }
document.getElementById('addInvLineBtn').addEventListener('click', function(){ invLineItems.push({name:'',qty:1,price:''}); renderInvLines(); });

// ── Payment helpers ──
function renderPayments(){
    document.getElementById('invPayments').innerHTML = invPayments.map(function(p,i){
        return '<div class="payment-row-item" style="margin-bottom:6px;">'+
            '<input class="form-input" type="date" value="'+(p.date||'')+'" oninput="invPayments['+i+'].date=this.value">'+
            '<select class="form-select" onchange="invPayments['+i+'].type=this.value">'+
                ['Cash','Check','Venmo','Zelle','Card','Other'].map(function(t){ return '<option value="'+t+'"'+(p.type===t?' selected':'')+'>'+t+'</option>'; }).join('')+
            '</select>'+
            '<input class="form-input" type="number" min="0" step="0.01" placeholder="0.00" value="'+(p.amount||'')+'" oninput="invPayments['+i+'].amount=this.value">'+
            '<button class="btn-remove-line" onclick="removePayment('+i+')">✕</button>'+
            '</div>';
    }).join('');
}
function removePayment(i){ invPayments.splice(i,1); renderPayments(); }
document.getElementById('addPaymentBtn').addEventListener('click', function(){
    invPayments.push({date:new Date().toISOString().slice(0,10), type:'Cash', amount:''});
    renderPayments();
});

// ── Modal open/close ──
function openInvModal(inv){
    invLineItems = inv
        ? inv.items.map(function(i){ return {name:i.name||'',qty:Number(i.qty)||1,price:Number(i.unitPrice)||0}; })
        : [{name:'',qty:1,price:''}];
    invPayments = inv
        ? inv.payments.map(function(p){
            var d='';
            try{ d=p.date.toDate().toISOString().slice(0,10); }catch(e){}
            return {date:d, type:p.type||'Cash', amount:Number(p.amount)||0};
          })
        : [];

    document.getElementById('editInvId').value        = inv ? inv.invId : '';
    document.getElementById('invModalTitle').textContent = inv ? 'Edit Invoice' : 'New Invoice';
    document.getElementById('invCustomer').value       = inv ? inv.uid : (custList[0]?custList[0].uid:'');
    document.getElementById('invDate').value           = inv && inv.dateIssued ? inv.dateIssued.toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
    document.getElementById('invStatus').value         = inv ? inv.status : 'Payment Due';
    document.getElementById('invJobId').value          = inv ? (inv.jobId||'') : '';
    document.getElementById('invModalStatus').textContent = '';
    renderInvLines();
    renderPayments();
    document.getElementById('invModal').classList.add('open');
}
function closeInvModal(){ document.getElementById('invModal').classList.remove('open'); }
document.getElementById('newInvBtn').addEventListener('click', function(){ openInvModal(null); });
document.getElementById('invModalClose').addEventListener('click', closeInvModal);
document.getElementById('cancelInvBtn').addEventListener('click', closeInvModal);
document.getElementById('invModal').addEventListener('click', function(e){ if(e.target===this) closeInvModal(); });

document.getElementById('saveInvBtn').addEventListener('click', async function(){
    var btn=this, status=document.getElementById('invModalStatus');
    var uid=document.getElementById('invCustomer').value;
    var dateVal=document.getElementById('invDate').value;
    if(!uid){ status.textContent='Select a customer.'; status.className='modal-status err'; return; }
    if(!dateVal){ status.textContent='Pick a date.'; status.className='modal-status err'; return; }

    var items    = invLineItems.map(function(li){ return {name:li.name||'—',qty:Number(li.qty)||1,unitPrice:Number(li.price)||0}; });
    var payments = invPayments.map(function(p){ return {date:firebase.firestore.Timestamp.fromDate(new Date(p.date+'T12:00:00')),type:p.type,amount:Number(p.amount)||0}; });

    var data = {
        uid:        uid,
        status:     document.getElementById('invStatus').value,
        dateIssued: firebase.firestore.Timestamp.fromDate(new Date(dateVal+'T12:00:00')),
        jobId:      document.getElementById('invJobId').value.trim(),
        items:      items,
        payments:   payments,
        updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
    };

    btn.disabled=true; status.textContent='Saving…'; status.className='modal-status';
    try {
        var editId=document.getElementById('editInvId').value;
        if(editId){ await db.collection('invoices').doc(editId).update(data); }
        else { data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); await db.collection('invoices').add(data); }
        status.textContent='Saved!'; status.className='modal-status ok';
        setTimeout(function(){ closeInvModal(); loadInvoices(); }, 600);
    } catch(e){
        status.textContent='Error: '+(e.message||'Permission denied'); status.className='modal-status err'; btn.disabled=false;
    }
});

// ── Toggle ──
function toggleInv(invId){
    var body=document.getElementById('inv-body-'+invId);
    var chev=document.getElementById('chev-'+invId);
    if(!body) return;
    var collapsed=body.classList.toggle('collapsed');
    if(chev) chev.style.transform = collapsed?'':'rotate(180deg)';
    if(!collapsed){ history.replaceState(null,null,'#'+invId); }
    else if(window.location.hash==='#'+invId){ history.replaceState(null,null,' '); }
}

async function deleteInv(invId){
    if(!confirm('Delete this invoice permanently?')) return;
    try { await db.collection('invoices').doc(invId).delete(); loadInvoices(); }
    catch(e){ alert('Error: '+(e.message||'Permission denied')); }
}

// ── Render ──
function renderInvoices(invoices, targetHash){
    var container=document.getElementById('invListContainer');
    if(!invoices.length){ container.innerHTML=empty('No invoices match your filters.'); return; }

    var html='<div class="inv-list">';
    invoices.forEach(function(inv){
        var invId=inv.invId, isTarget=invId===targetHash;
        var items=inv.items.map(function(it){ var qty=Number(it.qty)||1,unit=Number(it.unitPrice)||0; return {name:it.name||'—',qty:qty,unitPrice:unit,lineTotal:qty*unit}; });
        var total=items.reduce(function(s,i){ return s+i.lineTotal; },0);
        var paidAmt=inv.payments.reduce(function(s,p){ return s+Number(p.amount||0); },0);
        var balance=Math.max(0,Math.round((total-paidAmt)*100)/100);
        var desc=items.map(function(i){ return i.name; }).join(', ')||'Invoice';
        var dateStr=inv.dateIssued?inv.dateIssued.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
        var metaParts=dateStr+' · #'+invId+(inv.jobId?' · <a href="/staff/dashboard/jobs/#'+inv.jobId+'" style="color:var(--orange);">Job #'+inv.jobId+'</a>':'')+' · '+(custNames[inv.uid]||inv.uid||'—');

        var lineHTML=items.length?'<div><table class="line-items"><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr>'+
            items.map(function(i){ return '<tr><td>'+i.name+'</td><td>'+i.qty+'</td><td>'+fmtMoney(i.unitPrice)+'</td><td>'+fmtMoney(i.lineTotal)+'</td></tr>'; }).join('')+
            '<tr class="total-row"><td colspan="3">Invoice Total</td><td>'+fmtMoney(total)+'</td></tr></table></div>':'';

        var payHTML='';
        if(inv.payments.length){
            payHTML='<div><div class="inv-section-label">Payment History</div><div class="pay-history">'+
                inv.payments.map(function(p){
                    var pd='—'; try{ pd=p.date.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch(e){}
                    return '<div class="pay-row"><span>'+pd+' · '+(p.type||'—')+'</span><span class="pay-amount">+'+fmtMoney(p.amount)+'</span></div>';
                }).join('')+
                '</div><div class="balance-summary"><span>'+(balance>=0.01?'Balance Remaining':'Fully Paid')+'</span>'+
                '<span class="'+(balance>=0.01?'balance-due':'balance-clear')+'">'+fmtMoney(balance)+'</span></div></div>';
        } else if(total>0){
            payHTML='<div class="balance-summary"><span>Balance Due</span><span class="balance-due">'+fmtMoney(total)+'</span></div>';
        }

        html+='<div class="inv-card'+(isTarget?' highlight':'')+'" id="inv-card-'+invId+'">';
        html+='<div class="inv-card-header" onclick="toggleInv(\''+invId+'\')">';
        html+='<div class="inv-header-left"><div class="inv-card-title">'+desc+'</div><div class="inv-card-meta">'+metaParts+'</div>'+badge(inv.status)+'</div>';
        html+='<div class="inv-header-right"><div class="inv-total-amt">'+fmtMoney(total)+'</div>';
        if(balance>=0.01&&balance<total) html+='<div class="inv-remaining">'+fmtMoney(balance)+' remaining</div>';
        html+='<span class="toggle-chevron" id="chev-'+invId+'" style="'+(isTarget?'transform:rotate(180deg)':'')+'">▾</span></div></div>';
        html+='<div class="inv-card-body'+(isTarget?'',' collapsed')+'" id="inv-body-'+invId+'">';
        html+=lineHTML+payHTML;
        html+='<div class="inv-actions">'+
            '<button class="btn-ghost" onclick=\'editInv("'+invId+'")\'>Edit</button>'+
            '<button class="btn-ghost danger" onclick=\'deleteInv("'+invId+'")\'>Delete</button>'+
            (inv.jobId?'<a class="btn-ghost" href="/staff/dashboard/jobs/#'+inv.jobId+'">View Job</a>':'')+
            '</div>';
        html+='</div></div>';
    });
    html+='</div>';
    container.innerHTML=html;

    if(targetHash){
        var el=document.getElementById('inv-card-'+targetHash);
        if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth',block:'start'}); },100);
    }
}

function editInv(invId){
    var inv=allInvoices.find(function(i){ return i.invId===invId; });
    if(inv) openInvModal(inv);
}

function applyFilters(){
    var search=document.getElementById('searchInput').value.toLowerCase();
    var status=document.getElementById('statusFilter').value.toLowerCase();
    var filtered=allInvoices.filter(function(inv){
        if(status && inv.status.toLowerCase()!==status) return false;
        if(search){
            var hay=[custNames[inv.uid]||'', inv.invId, inv.items.map(function(i){ return i.name; }).join(' ')].join(' ').toLowerCase();
            if(hay.indexOf(search)===-1) return false;
        }
        return true;
    });
    renderInvoices(filtered, window.location.hash.replace('#',''));
}
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);

async function loadInvoices(){
    var snap=await db.collection('invoices').orderBy('dateIssued','desc').limit(300).get();
    allInvoices=[];
    snap.forEach(function(doc){
        var d=doc.data();
        allInvoices.push({
            invId:doc.id, uid:d.uid||'', status:d.status||'Payment Due',
            dateIssued:d.dateIssued?d.dateIssued.toDate():null,
            jobId:d.jobId||'',
            items:Array.isArray(d.items)?d.items:[],
            payments:Array.isArray(d.payments)?d.payments:[],
        });
    });
    applyFilters();
}

// Prefill from query param ?newFor=jobId
function prefillFromQuery(){
    var params=new URLSearchParams(window.location.search);
    var jobId=params.get('newFor');
    if(jobId){ document.getElementById('invJobId').value=jobId; openInvModal(null); }
}

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href='/staff/login/'; return; }
    document.getElementById('mobileAvatar').textContent=initials(user.displayName||user.email||'');

    var custSnap=await db.collection('customers').orderBy('name').get();
    custList=[];
    custSnap.forEach(function(doc){ var d=doc.data(); custNames[doc.id]=d.name||doc.id; custList.push({uid:doc.id,name:d.name||doc.id}); });
    document.getElementById('invCustomer').innerHTML=custList.map(function(c){ return '<option value="'+c.uid+'">'+c.name+'</option>'; }).join('');

    await loadInvoices();
    prefillFromQuery();
});
</script>

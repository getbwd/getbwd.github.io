<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<style>
.svc-row-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.svc-row-cust { font-size: 13.5px; font-weight: 700; color: var(--text); min-width: 140px; }
.svc-row-name { font-size: 13px; color: var(--text-2); flex: 1; min-width: 120px; }
.svc-row-detail { font-size: 12px; color: var(--text-3); }
.svc-row-actions { display: flex; gap: 6px; margin-left: auto; }
</style>
</head>
<body>
<div class="dash-shell">

<aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
        <p class="brand">BWD Services</p>
        <p class="brand-sub">Staff Portal</p>
        <span class="staff-badge">⚡ Staff</span>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="/staff/dashboard/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
        <a class="nav-item" href="/staff/dashboard/jobs/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Jobs</a>
        <a class="nav-item" href="/staff/dashboard/invoices/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Invoices</a>
        <a class="nav-item" href="/staff/dashboard/customers/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Customers</a>
        <a class="nav-item active" href="/staff/dashboard/services/"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Services</a>
    </nav>
    <div class="sidebar-footer">
        <button class="nav-item signout-btn" id="signOutBtn"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
</aside>

<header class="mobile-header">
    <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <span class="mobile-brand">BWD Staff</span>
    <div class="mobile-avatar" id="mobileAvatar">?</div>
</header>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="dash-main">
    <div class="dash-page">
        <div class="section-header">
            <h1 class="section-title">Services</h1>
            <p class="section-sub">All active and inactive service plans across customers.</p>
        </div>

        <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:22px;">
            <div class="stat-card"><span class="stat-label">Active Plans</span><span class="stat-value" id="statActive">—</span></div>
            <div class="stat-card"><span class="stat-label">Customers w/ Service</span><span class="stat-value" id="statCusts">—</span></div>
            <div class="stat-card accent"><span class="stat-label">Est. Monthly Revenue</span><span class="stat-value" id="statRevenue">—</span></div>
        </div>

        <div class="filter-bar">
            <input class="filter-input" id="searchInput" type="text" placeholder="Search customer or service name…">
            <select class="filter-select" id="statusFilter">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="seasonal">Seasonal</option>
                <option value="paused">Paused</option>
                <option value="on hold">On Hold</option>
                <option value="terminated">Terminated</option>
            </select>
        </div>

        <div id="svcContainer"><p style="color:#ccc;font-size:14px;">Loading…</p></div>
    </div>
</main>

</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
    apiKey:'AIzaSyBKm_3OhZkF4IshAy50xuzm0Q1uloDdgpA',authDomain:'bwd-accounts.firebaseapp.com',
    projectId:'bwd-accounts',storageBucket:'bwd-accounts.firebasestorage.app',
    messagingSenderId:'590001375282',appId:'1:590001375282:web:bd1725d5a5be3f9d28542b'
});
var auth = firebase.auth();
var db   = firebase.firestore();

document.getElementById('signOutBtn').addEventListener('click', function(){ auth.signOut().then(function(){ window.location.href='/staff/login/'; }); });
document.getElementById('mobileMenuBtn').addEventListener('click', function(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('visible'); });
document.getElementById('sidebarOverlay').addEventListener('click', function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });

function initials(n){ return n ? n.trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2) : '?'; }
function fmtMoney(n){ return '$' + Number(n).toFixed(2); }
function badge(status){
    var s=(status||'').toLowerCase().trim();
    var map={'active':'bdg-active','seasonal':'bdg-paused','paused':'bdg-paused','on hold':'bdg-overdue','terminated':'bdg-cancelled'};
    return '<span class="bdg '+(map[s]||'bdg-default')+'">'+(status||'—')+'</span>';
}

var allRows = []; // {custName, custUid, svc, docUid}

function freqMultiplier(freq){
    if(!freq) return 4;
    freq = freq.toLowerCase();
    if(freq.indexOf('week')!==-1) return 4;
    if(freq.indexOf('bi-week')!==-1||freq.indexOf('every other')!==-1) return 2;
    if(freq.indexOf('month')!==-1) return 1;
    return 4;
}

function renderRows(rows){
    var container = document.getElementById('svcContainer');
    if(!rows.length){ container.innerHTML='<p class="empty-state">No services match your filters.</p>'; return; }
    container.innerHTML = rows.map(function(r){
        var s = r.svc;
        var isActive = ['active','seasonal'].indexOf((s.status||'').toLowerCase())!==-1;
        return '<div class="svc-row-card">'+
            '<div>'+
                '<div class="svc-row-cust"><a href="/staff/dashboard/customers/#'+r.custUid+'" style="color:var(--orange);text-decoration:none;">'+r.custName+'</a></div>'+
            '</div>'+
            '<div class="svc-row-name"><strong>'+s.name+'</strong></div>'+
            '<div class="svc-row-detail">'+(s.frequency||'—')+' · '+fmtMoney(s.pricePerVisit||0)+'/visit</div>'+
            badge(s.status)+
            '<div class="svc-row-actions">'+
                '<a class="btn-ghost" href="/staff/dashboard/customers/#'+r.custUid+'">Edit</a>'+
                '<a class="btn-ghost" href="/staff/dashboard/jobs/?customer='+r.custUid+'">Jobs</a>'+
            '</div>'+
            '</div>';
    }).join('');
}

function applyFilters(){
    var search = document.getElementById('searchInput').value.toLowerCase();
    var status = document.getElementById('statusFilter').value.toLowerCase();
    var filtered = allRows.filter(function(r){
        if(status && (r.svc.status||'').toLowerCase() !== status) return false;
        if(search){
            var hay = [r.custName, r.svc.name].join(' ').toLowerCase();
            if(hay.indexOf(search)===-1) return false;
        }
        return true;
    });
    renderRows(filtered);
}
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);

auth.onAuthStateChanged(async function(user){
    if(!user){ window.location.href='/staff/login/'; return; }
    document.getElementById('mobileAvatar').textContent=initials(user.displayName||user.email||'');

    // Load customer names
    var custNames = {};
    var custSnap = await db.collection('customers').get();
    custSnap.forEach(function(doc){ custNames[doc.id]=(doc.data().name||doc.id); });

    // Load all services docs
    var svcSnap = await db.collection('services').get();
    allRows = [];
    svcSnap.forEach(function(doc){
        var uid = doc.id;
        var services = doc.data().services || [];
        services.forEach(function(s){
            allRows.push({ custUid:uid, custName:custNames[uid]||uid, svc:s });
        });
    });

    // Sort: active first, then by customer name
    allRows.sort(function(a,b){
        var aA = ['active','seasonal'].indexOf((a.svc.status||'').toLowerCase())!==-1 ? 0 : 1;
        var bA = ['active','seasonal'].indexOf((b.svc.status||'').toLowerCase())!==-1 ? 0 : 1;
        if(aA!==bA) return aA-bA;
        return a.custName.localeCompare(b.custName);
    });

    // Stats
    var activeRows = allRows.filter(function(r){ return ['active','seasonal'].indexOf((r.svc.status||'').toLowerCase())!==-1; });
    var activeCusts = new Set(activeRows.map(function(r){ return r.custUid; })).size;
    var estMonthly = activeRows.reduce(function(s,r){
        return s + Number(r.svc.pricePerVisit||0) * freqMultiplier(r.svc.frequency);
    }, 0);

    document.getElementById('statActive').textContent   = activeRows.length;
    document.getElementById('statCusts').textContent    = activeCusts;
    document.getElementById('statRevenue').textContent  = fmtMoney(estMonthly);

    applyFilters();
});
</script>

</body>
</html>
